<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Courses - RENVOX</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* ==================== PAGE HEADER ==================== */
        .page-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #3730a3 100%);
            color: var(--white);
            padding: 3rem 2rem;
            margin-bottom: 3rem;
            text-align: center;
        }

        .page-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            font-size: 1.05rem;
            opacity: 0.9;
        }

        /* ==================== CERTIFICATE CARDS ==================== */
        .certificates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .cert-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .cert-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            transform: translateY(-6px);
        }

        .cert-card-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #3730a3 100%);
            padding: 1.25rem;
            color: var(--white);
            text-align: center;
        }

        .cert-icon {
            font-size: 2.5rem;
            margin-bottom: 0.25rem;
        }

        .cert-card-title {
            font-size: 1.15rem;
            margin-bottom: 0.25rem;
        }

        .cert-card-body {
            padding: 1.25rem;
        }

        .cert-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .info-value {
            font-size: 0.9rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .cert-description {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .cert-highlights {
            list-style: none;
            margin-bottom: 1rem;
        }

        .cert-highlights li {
            padding: 0.25rem 0;
            display: flex;
            gap: 0.6rem;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        .cert-highlights li:before {
            content: "✓";
            color: var(--accent-color);
            font-weight: bold;
            min-width: 20px;
        }

        .cert-price {
            background-color: var(--secondary-color);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .price-amount {
            font-size: 1.75rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .price-period {
            color: var(--text-light);
            font-size: 0.8rem;
        }

        .btn-enroll {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .btn-enroll:hover {
            background-color: #1e2d6f;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 58, 138, 0.3);
        }

        .btn-enroll.free {
            background-color: var(--accent-color);
        }

        .btn-enroll.free:hover {
            background-color: #059669;
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 2rem 1rem;
                margin-bottom: 2rem;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }

            .certificates-grid {
                grid-template-columns: 1fr;
            }

            .cert-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>
    <!-- ==================== NAVBAR ==================== -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-book"></i> RENVOX
            </a>
            <div class="nav-search">
                <input type="text" id="navbarSearch" placeholder="Search for courses, subjects, or concepts...">
                <button type="button" onclick="handleNavbarSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="certificates.html" class="active">Certificates</a></li>
                <li><a href="practice.html">Practice</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="Family.html">Family</a></li>
            </ul>
            <div class="nav-buttons" id="navButtons">
                <!-- Filled by JavaScript -->
            </div>
        </div>
    </nav>

    <!-- ==================== PAGE HEADER ==================== -->
    <div class="page-header">
        <div class="container">
            <h1>🎓 Certificate Courses</h1>
            <p>Structured courses with assignments & verified certificates</p>
        </div>
    </div>

    <!-- ==================== CERTIFICATES GRID ==================== -->
    <div class="container">
        <div class="certificates-grid" id="certGrid">
            <!-- Filled by JavaScript -->
        </div>
    </div>

    <!-- ==================== FOOTER ==================== -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2025 RENVOX – All rights reserved.</p>
        </div>
    </footer>

    <script>
        const isLoggedIn = localStorage.getItem('renvoxUser') !== null;
        const userName = localStorage.getItem('userName') || 'User';

        const certificates = [
            {
                title: 'C Programming Fundamentals',
                icon: '💻',
                duration: '4 Weeks',
                level: 'Beginner',
                assignments: 8,
                description: 'Master C programming from scratch with practical assignments and real-world projects.',
                highlights: ['8 Assignments', 'Live Projects', '40+ Hours Content', 'Job Ready Skills'],
                price: 799,
                isFree: false
            },
            {
                title: 'Data Structures Advanced',
                icon: '🔗',
                duration: '6 Weeks',
                level: 'Intermediate',
                assignments: 12,
                description: 'Deep dive into data structures with interview prep and competitive programming.',
                highlights: ['12 Assignments', 'Interview Questions', 'Coding Challenges', 'Certificate'],
                price: 1199,
                isFree: false
            },
            {
                title: 'Web Development Bootcamp',
                icon: '🌐',
                duration: '8 Weeks',
                level: 'Intermediate',
                assignments: 10,
                description: 'Complete web development course covering HTML, CSS, JavaScript, and React.',
                highlights: ['10 Projects', 'Portfolio Ready', 'Job Support', 'Lifetime Access'],
                price: 1999,
                isFree: false
            },
            {
                title: 'Python for Data Science',
                icon: '🐍',
                duration: '5 Weeks',
                level: 'Intermediate',
                assignments: 7,
                description: 'Learn Python with NumPy, Pandas, Matplotlib for data science applications.',
                highlights: ['7 Projects', 'Real Datasets', 'ML Basics', 'Career Ready'],
                price: 999,
                isFree: false
            },
            {
                title: 'Database Management Systems',
                icon: '🗄️',
                duration: '3 Weeks',
                level: 'Beginner',
                assignments: 5,
                description: 'Learn DBMS concepts with SQL and practical database design projects.',
                highlights: ['5 Assignments', 'SQL Mastery', 'Database Design', 'Verified Cert'],
                price: 599,
                isFree: false
            },
            {
                title: 'Learning Essentials (Free)',
                icon: '📚',
                duration: '2 Weeks',
                level: 'Beginner',
                assignments: 3,
                description: 'Free beginner course to understand RENVOX platform and learning basics.',
                highlights: ['3 Assignments', 'Free Access', 'Digital Certificate', 'No Credit Card'],
                price: 0,
                isFree: true
            }
        ];

        function setupNavbar() {
            const navButtons = document.getElementById('navButtons');

            if (isLoggedIn) {
                navButtons.innerHTML = `
                    <button class="btn-user">
                        <i class="fas fa-user-circle"></i>
                        <span>${userName}</span>
                    </button>
                    <button class="btn-user" style="background-color: #fee2e2; color: #dc2626;" onclick="logout()">Logout</button>
                `;
            } else {
                navButtons.innerHTML = `
                    <a href="signup.html" class="btn-user">Login</a>
                    <a href="signup.html" class="btn-user" style="background-color: var(--primary-color); color: white;">Sign Up</a>
                `;
            }
        }

        function renderCertificates() {
            const grid = document.getElementById('certGrid');

            // Get search query from URL if present
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');

            // Set input value if searched
            const searchInput = document.getElementById('navbarSearch');
            if (searchInput && searchQuery) {
                searchInput.value = searchQuery;
            }

            // Filter certificates based on search query
            let filteredCerts = certificates;
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filteredCerts = certificates.filter(cert =>
                    cert.title.toLowerCase().includes(query) ||
                    cert.description.toLowerCase().includes(query) ||
                    cert.highlights.some(h => h.toLowerCase().includes(query))
                );
            }

            if (filteredCerts.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; background: var(--secondary-color); border-radius: 8px;">
                        <i class="fas fa-search" style="font-size: 3rem; color: var(--text-light); margin-bottom: 1rem;"></i>
                        <h2>No courses found</h2>
                        <p style="color: var(--text-light); margin-top: 0.5rem;">We couldn't find any courses matching "${searchQuery}". Try different keywords.</p>
                        <button class="btn-primary" style="margin-top: 1.5rem;" onclick="window.location.href='certificates.html'">View All Courses</button>
                    </div>
                `;
                return;
            }

            const html = filteredCerts.map(cert => `
                <div class="cert-card">
                    <div class="cert-card-header">
                        <div class="cert-icon">${cert.icon}</div>
                        <h3 class="cert-card-title">${cert.title}</h3>
                    </div>
                    <div class="cert-card-body">
                        <div class="cert-info">
                            <div class="info-item">
                                <span class="info-label">⏱️ Duration</span>
                                <span class="info-value">${cert.duration}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">📊 Level</span>
                                <span class="info-value">${cert.level}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">✏️ Assignments</span>
                                <span class="info-value">${cert.assignments}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">🎓 Certification</span>
                                <span class="info-value">Verified</span>
                            </div>
                        </div>
                        
                        <div class="cert-price">
                            ${cert.isFree ?
                    '<span class="price-amount">FREE</span>' :
                    `<div class="price-amount">₹${cert.price}</div><div class="price-period">One-time payment</div>`
                }
                        </div>
                        
                        <button class="btn-enroll ${cert.isFree ? 'free' : ''}" onclick="enrollCourse('${cert.title}')">
                            ${isLoggedIn ? (cert.isFree ? 'Enroll Free' : 'Enroll Now') : 'Sign Up to Enroll'}
                        </button>
                    </div>
                </div>
            `).join('');

            grid.innerHTML = html;
        }

        async function enrollCourse(courseName) {

            const course = certificates.find(c => c.title === courseName);
            if (!course) return;

            if (course.isFree) {
                // Directly redirect for free courses
                window.location.href = `course-content.html?course=${encodeURIComponent(courseName)}`;
                return;
            }

            try {
                // 1. Create order on backend
                const response = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: course.price, course: courseName })
                });

                const orderData = await response.json();
                if (!orderData.ok) {
                    alert('Error creating order');
                    return;
                }

                // 2. Initialize Razorpay Checkout
                const options = {
                    "key": "rzp_test_TYYvG5LdO0V12j", // Test Key
                    "amount": orderData.amount,
                    "currency": orderData.currency,
                    "name": "RENVOX AI",
                    "description": `Enroll in ${courseName}`,
                    "order_id": orderData.orderId,
                    "handler": async function (paymentResponse) {
                        try {
                            // 3. Verify Payment
                            const verifyRes = await fetch('/api/verify-payment', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    razorpay_order_id: paymentResponse.razorpay_order_id,
                                    razorpay_payment_id: paymentResponse.razorpay_payment_id,
                                    razorpay_signature: paymentResponse.razorpay_signature
                                })
                            });
                            const verifyData = await verifyRes.json();
                            if (verifyData.ok) {
                                // 4. Redirect to Course Content after success
                                window.location.href = `course-content.html?course=${encodeURIComponent(courseName)}`;
                            } else {
                                alert('Payment verification failed');
                            }
                        } catch (err) {
                            console.error(err);
                            alert('An error occurred during verification.');
                        }
                    },
                    "prefill": {
                        "name": userName,
                        "email": "student@example.com",
                        "contact": "9999999999"
                    },
                    "theme": {
                        "color": "#4f46e5"
                    }
                };

                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function (response) {
                    alert("Payment Failed: " + response.error.description);
                });
                rzp.open();

            } catch (err) {
                console.error("Payment Error:", err);
                alert("Error initializing payment. Check console.");
            }
        }

        function logout() {
            if (confirm('Logout?')) {
                localStorage.removeItem('renvoxUser');
                localStorage.removeItem('userName');
                window.location.reload();
            }
        }

        setupNavbar();
        renderCertificates();
    </script>
    <!-- Navigation System -->
    <script src="navigation.js"></script>
</body>

</html>
