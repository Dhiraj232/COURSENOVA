<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Certificates | RENVOX AI</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #273549;
            --border: #334155;
            --primary: #6366f1;
            --success: #10b981;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        

        

        .nav-menu {
            display: flex;
            gap: 1.5rem;
        }

        .nav-menu a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--text);
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface2);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
        }

        .user-chip img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .avatar-ph {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
        }

        .hero {
            padding: 3rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .hero h1 span {
            color: var(--primary);
        }

        .hero p {
            color: var(--muted);
            margin-top: 0.5rem;
        }

        .certs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .cert-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
        }

        .cert-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--success);
        }

        .cert-thumb {
            height: 140px;
            background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #10b981 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .cert-thumb-icon {
            font-size: 2.5rem;
        }

        .cert-thumb-badge {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
            letter-spacing: 0.08em;
        }

        .cert-body {
            padding: 1.5rem;
        }

        .cert-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .cert-meta {
            color: var(--muted);
            font-size: 0.82rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .cert-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .cert-id {
            font-family: monospace;
            font-size: 0.78rem;
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            word-break: break-all;
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
            margin-bottom: 1rem;
        }

        .btn-download-cert {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-download-cert:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .empty {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--muted);
            max-width: 1200px;
            margin: 0 auto;
        }

        .empty i {
            font-size: 4rem;
            opacity: 0.3;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .empty a {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            background: var(--primary);
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
        }

        .spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5rem;
            gap: 1rem;
            color: var(--muted);
        }

        .spinner i {
            animation: spin 1s linear infinite;
            font-size: 2rem;
            color: var(--primary);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Hidden canvas for certificate generation */
        #certCanvas {
            display: none;
        }

        @media (max-width: 768px) {

            .hero,
            .certs-grid {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            

            .nav-menu {
                display: none;
            }
        }
    </style>
    <link rel="stylesheet" href="css/navigation.css">
    <script src="js/navigation.js"></script>
</head>

<body class="dark-theme">
    <!-- standard navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="images/logo%20renvox.png" alt="RENVOX"> <span>RENVOX</span></a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                
                <li><a href="practice.html">Practice</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="community.html">Community</a></li>
                
            </ul>
            <div class="nav-buttons" id="navButtons"></div>
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <div class="hero">
        <h1>My <span>Certificates</span></h1>
        <p>Download your earned certificates — proof of your hard work.</p>
    </div>

    <div class="spinner" id="spinner"><i class="fas fa-circle-notch"></i> Loading...</div>
    <div class="certs-grid" id="certsGrid" style="display:none;"></div>
    <div class="empty" id="emptyState" style="display:none;">
        <i class="fas fa-trophy"></i>
        <h3>No certificates yet!</h3>
        <p>Complete a course and pass the final test to earn your first certificate.</p>
        <a href="my-courses.html">Go to My Courses</a>
    </div>

    <!-- Off-screen canvas for certificate rendering -->
    <canvas id="certCanvas" width="1200" height="850"></canvas>

    <script>
        const API = ''; // Use relative paths
        const token = localStorage.getItem('renvoxToken') || localStorage.getItem('renvox_token');
        if (!token) window.location.href = 'signup.html?redirect=my-certificates.html';

        let currentUserName = 'Student';

        async function loadUser() {
            try {
                const res = await fetch(`${API}/api/me`, { headers: { Authorization: `Bearer ${token}` } });
                const data = await res.json();
                if (data.ok) {
                    currentUserName = data.user.fullName || data.user.email;
                    document.getElementById('userName').textContent = currentUserName;
                    const av = document.getElementById('userAvatar');
                    if (data.user.picture) {
                        av.innerHTML = `<img src="${data.user.picture}" alt="avatar">`;
                        av.style.background = 'transparent';
                    } else {
                        av.textContent = (currentUserName || '?')[0].toUpperCase();
                    }
                }
            } catch { }
        }

        async function loadCertificates() {
            try {
                const res = await fetch(`${API}/api/course/my-certificates`, { headers: { Authorization: `Bearer ${token}` } });
                const data = await res.json();
                document.getElementById('spinner').style.display = 'none';

                if (!data.ok || !data.certificates || data.certificates.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                // Update currentUserName from response
                if (data.userName && data.userName !== 'Student') currentUserName = data.userName;

                const grid = document.getElementById('certsGrid');
                grid.style.display = 'grid';
                grid.innerHTML = data.certificates.map(cert => {
                    const date = cert.earnedAt
                        ? new Date(cert.earnedAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'long', year: 'numeric' })
                        : 'Date N/A';
                    const score = cert.score ? cert.score + '%' : '—';
                    return `
                    <div class="cert-card">
                        <div class="cert-thumb">
                            <span class="cert-thumb-icon">🏆</span>
                            <span class="cert-thumb-badge">CERTIFICATE OF COMPLETION</span>
                        </div>
                        <div class="cert-body">
                            <div class="cert-title">${escHtml(cert.courseId)}</div>
                            <div class="cert-meta">
                                <span><i class="fas fa-calendar-check"></i> Earned on ${date}</span>
                                <span><i class="fas fa-user-graduate"></i> ${escHtml(currentUserName)}</span>
                            </div>
                            <div class="cert-id"><i class="fas fa-fingerprint"></i> ${escHtml(cert.certId)}</div>
                            <div class="score-badge"><i class="fas fa-star"></i> Score: ${score}</div>
                            <button class="btn-download-cert" onclick="downloadCertificate('${escAttr(cert.certId)}','${escAttr(cert.courseId)}','${escAttr(date)}')">
                                <i class="fas fa-download"></i> Download Certificate
                            </button>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                console.error('Error loading certificates:', err);
            }
        }

        // ── Certificate generator (Canvas) ─────────────────────────────────────
        function downloadCertificate(certId, courseName, dateStr) {
            const canvas = document.getElementById('certCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            // Background
            ctx.clearRect(0, 0, W, H);
            const bgGrad = ctx.createLinearGradient(0, 0, W, H);
            bgGrad.addColorStop(0, '#0f172a');
            bgGrad.addColorStop(1, '#1e293b');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // Outer border
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 6;
            ctx.strokeRect(30, 30, W - 60, H - 60);

            // Inner border
            ctx.strokeStyle = 'rgba(16,185,129,0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(46, 46, W - 92, H - 92);

            // Gold accent top bar
            const topGrad = ctx.createLinearGradient(0, 60, W, 60);
            topGrad.addColorStop(0, 'transparent');
            topGrad.addColorStop(0.2, '#10b981');
            topGrad.addColorStop(0.8, '#10b981');
            topGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = topGrad;
            ctx.fillRect(50, 70, W - 100, 4);

            // Trophy emoji
            ctx.font = '80px serif';
            ctx.textAlign = 'center';
            ctx.fillText('🏆', W / 2, 180);

            // "Certificate of Completion"
            ctx.font = '600 22px Inter, sans-serif';
            ctx.fillStyle = '#10b981';
            ctx.letterSpacing = '6px';
            ctx.fillText('CERTIFICATE OF COMPLETION', W / 2, 230);
            ctx.letterSpacing = '0px';

            // Divider
            ctx.fillStyle = 'rgba(16,185,129,0.4)';
            ctx.fillRect(W / 2 - 200, 248, 400, 1);

            // "This is to certify that"
            ctx.font = '18px Inter, sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('This is to certify that', W / 2, 300);

            // Student name
            ctx.font = 'bold 48px "Playfair Display", serif';
            const nameGrad = ctx.createLinearGradient(W / 2 - 250, 0, W / 2 + 250, 0);
            nameGrad.addColorStop(0, '#e2e8f0');
            nameGrad.addColorStop(0.5, '#ffffff');
            nameGrad.addColorStop(1, '#e2e8f0');
            ctx.fillStyle = nameGrad;
            ctx.fillText(currentUserName, W / 2, 370);

            // Underline name
            const nameW = ctx.measureText(currentUserName).width;
            ctx.fillStyle = '#6366f1';
            ctx.fillRect(W / 2 - nameW / 2, 380, nameW, 2);

            // "has successfully completed"
            ctx.font = '18px Inter, sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('has successfully completed', W / 2, 430);

            // Course name
            ctx.font = 'bold 34px Inter, sans-serif';
            ctx.fillStyle = '#e2e8f0';
            // Wrap long course names
            const maxWidth = W - 200;
            const words = courseName.split(' ');
            let line = '', lineY = 490;
            for (const word of words) {
                const test = line + (line ? ' ' : '') + word;
                if (ctx.measureText(test).width > maxWidth && line) {
                    ctx.fillText(line, W / 2, lineY);
                    line = word; lineY += 44;
                } else { line = test; }
            }
            ctx.fillText(line, W / 2, lineY);

            // Bottom info row
            const infoY = H - 160;
            ctx.font = '600 14px Inter, sans-serif';
            ctx.fillStyle = '#64748b';
            // Date
            ctx.textAlign = 'left';
            ctx.fillText('DATE ISSUED', 100, infoY);
            ctx.font = '18px Inter, sans-serif';
            ctx.fillStyle = '#e2e8f0';
            ctx.fillText(dateStr, 100, infoY + 28);

            // Cert ID
            ctx.textAlign = 'center';
            ctx.font = '600 14px Inter, sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.fillText('CERTIFICATE ID', W / 2, infoY);
            ctx.font = '16px monospace';
            ctx.fillStyle = '#6366f1';
            ctx.fillText(certId, W / 2, infoY + 28);

            // Issued by
            ctx.textAlign = 'right';
            ctx.font = '600 14px Inter, sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.fillText('ISSUED BY', W - 100, infoY);
            ctx.font = 'bold 18px Inter, sans-serif';
            ctx.fillStyle = '#10b981';
            ctx.fillText('RENVOX AI', W - 100, infoY + 28);

            // Bottom divider
            const botGrad = ctx.createLinearGradient(0, H - 100, W, H - 100);
            botGrad.addColorStop(0, 'transparent');
            botGrad.addColorStop(0.2, '#10b981');
            botGrad.addColorStop(0.8, '#10b981');
            botGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = botGrad;
            ctx.fillRect(50, H - 100, W - 100, 2);

            // Footer
            ctx.textAlign = 'center';
            ctx.font = '13px Inter, sans-serif';
            ctx.fillStyle = '#475569';
            ctx.fillText('This certificate is digitally issued by RENVOX AI Learning Platform', W / 2, H - 55);

            // Download
            const link = document.createElement('a');
            link.download = `RENVOX_Certificate_${certId}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function escHtml(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function escAttr(str) {
            return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        loadUser();
        loadCertificates();
    </script>
    
</body>

</html>
