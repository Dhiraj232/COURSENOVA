<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results | COURSENOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; }
        .results-page-container { max-width: 800px; margin: 120px auto 40px; padding: 0 20px; }
        .result-card { background: white; border-radius: 24px; padding: 60px 40px; text-align: center; box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05); }
        .result-badge { display: inline-block; padding: 8px 16px; border-radius: 50px; font-weight: 800; font-size: 0.9rem; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .result-badge.pass { background: #dcfce7; color: #10b981; }
        .result-badge.fail { background: #fee2e2; color: #ef4444; }
        .result-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 12px; color: #0f172a; }
        .result-subtitle { font-size: 1.1rem; color: #64748b; margin-bottom: 40px; }
        .score-circle { width: 180px; height: 180px; border-radius: 50%; border: 12px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 40px; }
        .score-value { font-size: 3.5rem; font-weight: 800; color: #6366f1; line-height: 1; }
        .score-label { font-size: 1rem; color: #94a3b8; font-weight: 600; margin-top: 4px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-item { padding: 20px; background: #f8fafc; border-radius: 16px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #1e293b; display: block; }
        .stat-label { font-size: 0.85rem; color: #64748b; font-weight: 600; }
        .action-btns { display: flex; gap: 16px; justify-content: center; }
        .btn { padding: 14px 28px; border-radius: 14px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: flex; align-items: center; gap: 8px; border: none; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .btn-secondary { background: white; border: 1.5px solid #e2e8f0; color: #475569; }
        .btn-secondary:hover { background: #f8fafc; }
        .confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
    </style>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/coursenova-logo.png">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <!-- Platform Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="images/coursenova-logo.png" alt="COURSENOVA"> <span>COURSENOVA</span></a>
            <ul class="nav-menu" id="navMenu"></ul>
            <div class="nav-buttons" id="navButtons"></div>
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <div class="results-page-container">
        <div class="result-card">
            <div class="result-badge" id="passBadge">PASSED</div>
            <h1 class="result-title" id="resultTitle">Great job!</h1>
            <p class="result-subtitle">You've successfully completed the practice quiz.</p>

            <div class="score-circle">
                <span class="score-value" id="scoreValue">0%</span>
                <span class="score-label">Final Score</span>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="correctCount">0</span>
                    <span class="stat-label">Correct</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="wrongCount">0</span>
                    <span class="stat-label">Wrong</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="avgTime">0s</span>
                    <span class="stat-label">Avg Time</span>
                </div>
            </div>

            <div class="action-btns">
                <a href="practice.html" class="btn btn-secondary">
                    <i class="fas fa-redo"></i> Try Another
                </a>
                <a href="testing-center.html" class="btn btn-primary">
                    <i class="fas fa-arrow-right"></i> Explore More
                </a>
            </div>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const results = JSON.parse(localStorage.getItem('last_quiz_results'));
            if (!results) {
                window.location.href = 'practice.html';
                return;
            }

            const score = Math.round((results.correct / results.total) * 100);
            const passed = score >= 50;

            document.getElementById('scoreValue').textContent = score + '%';
            document.getElementById('correctCount').textContent = results.correct;
            document.getElementById('wrongCount').textContent = results.total - results.correct;
            document.getElementById('avgTime').textContent = results.avgTime + 's';

            const badge = document.getElementById('passBadge');
            const title = document.getElementById('resultTitle');

            if (passed) {
                badge.textContent = 'PASSED';
                badge.className = 'result-badge pass';
                title.textContent = 'Great job!';
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#6366f1', '#10b981', '#fbbf24']
                });
            } else {
                badge.textContent = 'NEEDS REVIEW';
                badge.className = 'result-badge fail';
                title.textContent = 'Not quiet there yet';
            }
        });
    </script>
</body>
</html>
