<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Daily Challenge Upload | COURSENOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; padding: 40px; }
        .admin-card { background: white; max-width: 800px; margin: 0 auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-family: 'Outfit', sans-serif; font-weight: 800; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        input[type="text"], input[type="date"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .btn { padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .preview-area { margin-top: 40px; display: none; }
        .question-item { background: #f1f5f9; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #2563eb; }
        .loading { display: none; margin-top: 20px; color: #2563eb; font-weight: 700; }
    </style>
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="admin-card">
        <h1>🚀 SSC CGL Daily Challenge Admin</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Upload an SSC-style PDF question paper. Our system will extract the questions and create a live test.</p>

        <form id="uploadForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Test Date</label>
                    <input type="date" id="testDate" required onchange="updateDefaultTitle()">
                </div>
                <div class="form-group">
                    <label>Exam Type</label>
                    <select id="examType" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px;" onchange="updateDefaultTitle()">
                        <option value="SSC CGL">SSC CGL</option>
                        <option value="Railway Group D">Railway Group D</option>
                        <option value="CTET">CTET</option>
                        <option value="Army GD">Army GD</option>
                        <option value="Bihar Police">Bihar Police</option>
                        <option value="SSC GD">SSC GD</option>
                        <option value="UP Police">UP Police</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Test Title</label>
                <input type="text" id="testTitle" placeholder="e.g. SSC CGL Daily Set - 02 May 2026" required>
            </div>
            <div class="form-group">
                <label>Upload Question PDF</label>
                <input type="file" id="pdfFile" accept="application/pdf" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem;"><i class="fas fa-magic"></i> Process & Generate Test</button>
        </form>

        <div id="loadingMsg" class="loading" style="text-align: center; padding: 20px;">
            <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>
            Processing PDF... Extracting MCQs...
        </div>

        <div id="previewArea" class="preview-area">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; background:#f0f9ff; padding:15px; border-radius:12px; border:1px solid #bae6fd;">
                <h3 style="margin:0; color:#0369a1;"><i class="fas fa-list-check"></i> Extracted <span id="qCount">0</span> Questions</h3>
                <button class="btn btn-primary" onclick="saveChallenge()" style="background: #10b981;"><i class="fas fa-rocket"></i> Publish to Live Challenge</button>
            </div>
            <div id="questionsList"></div>
        </div>
    </div>

    <script>
        let extractedQuestions = [];
        const urlParams = new URLSearchParams(window.location.search);
        const challengeId = urlParams.get('id');

        function updateDefaultTitle() {
            const dateStr = document.getElementById('testDate').value;
            const exam = document.getElementById('examType').value;
            if (dateStr) {
                const date = new Date(dateStr);
                const options = { day: '2-digit', month: 'short', year: 'numeric' };
                const formatted = date.toLocaleDateString('en-GB', options);
                document.getElementById('testTitle').value = `${exam} Daily Set - ${formatted}`;
            }
        }

        // Set default date to today
        document.getElementById('testDate').valueAsDate = new Date();
        updateDefaultTitle();

        // Check for existing challenge
        if (challengeId) {
            loadExistingChallenge();
        }

        async function loadExistingChallenge() {
            try {
                const res = await fetch(`/api/test/daily-challenge/challenge/${challengeId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await res.json();
                
                if (data.ok && data.challenge) {
                    const challenge = data.challenge;
                    document.getElementById('testDate').value = challenge.date;
                    document.getElementById('testTitle').value = challenge.title;
                    document.getElementById('examType').value = challenge.examType;
                    extractedQuestions = challenge.questions;
                    renderPreview();
                }
            } catch (err) {
                console.error('Failed to load challenge:', err);
            }
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('pdf', document.getElementById('pdfFile').files[0]);
            formData.append('date', document.getElementById('testDate').value);
            formData.append('title', document.getElementById('testTitle').value);
            formData.append('examType', document.getElementById('examType').value);

            document.getElementById('loadingMsg').style.display = 'block';
            document.getElementById('previewArea').style.display = 'none';

            const expectedCount = extractedQuestions.length;

            try {
                const res = await fetch(`/api/admin/daily-challenge/upload?expectedCount=${expectedCount}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: formData
                });
                const data = await res.json();
                
                if (data.ok) {
                    extractedQuestions = data.questions;
                    renderPreview();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('Upload failed.');
            } finally {
                document.getElementById('loadingMsg').style.display = 'none';
            }
        };

        function renderPreview() {
            const list = document.getElementById('questionsList');
            document.getElementById('qCount').textContent = extractedQuestions.length;
            list.innerHTML = extractedQuestions.map((q, i) => `
                <div class="question-item">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <strong>Question ${i+1}</strong>
                        <span style="background:#dcfce7; color:#166534; padding:2px 8px; border-radius:5px; font-size:0.8rem; font-weight:700;">Status: Ready</span>
                    </div>
                    <div style="font-weight:500; margin-bottom:10px;">${q.question}</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                        ${q.options.map((opt, j) => `
                            <div style="background:white; padding:8px; border-radius:6px; font-size:0.9rem; border:1px solid #e2e8f0;">
                                <span style="color:#94a3b8; font-weight:700;">${String.fromCharCode(65+j)})</span> ${opt}
                            </div>
                        `).join('')}
                    </div>
                    <div style="color: #10b981; font-weight: 700; font-size:0.9rem;">
                        <i class="fas fa-check-circle"></i> Correct Answer: ${q.correctAnswer}
                    </div>
                </div>
            `).join('');
            document.getElementById('previewArea').style.display = 'block';
        }

        async function saveChallenge() {
            const payload = {
                date: document.getElementById('testDate').value,
                title: document.getElementById('testTitle').value,
                examType: document.getElementById('examType').value,
                questions: extractedQuestions
            };

            try {
                const res = await fetch('/api/admin/daily-challenge/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.ok) {
                    alert('Daily Challenge saved successfully!');
                    window.location.href = 'admin-dashboard.html';
                }
            } catch (err) {
                alert('Save failed.');
            }
        }
    </script>
</body>
</html>
