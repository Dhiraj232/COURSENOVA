<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test Player | COURSENOVA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .player-nav {
            background: white; padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100;
        }
        .timer { font-size: 1.2rem; font-weight: 700; color: #ef4444; }
        .lang-toggle {
            background: #e2e8f0; padding: 5px; border-radius: 30px; 
            display: flex; gap: 5px; cursor: pointer;
        }
        .lang-toggle span {
            padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 600;
            transition: 0.3s;
        }
        .lang-toggle span.active { background: #3b82f6; color: white; }

        .player-container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .question-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px;
        }
        .q-meta { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .q-text { font-size: 1.4rem; font-weight: 600; color: #1e293b; margin-bottom: 30px; line-height: 1.6; }
        
        .option {
            background: #f8fafc; border: 2px solid #e2e8f0; padding: 18px 25px;
            border-radius: 12px; margin-bottom: 15px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 15px;
        }
        .option:hover { border-color: #3b82f6; background: #eff6ff; }
        .option.selected { border-color: #3b82f6; background: #3b82f6; color: white; }
        .option-radio { width: 22px; height: 22px; border: 2px solid #cbd5e1; border-radius: 50%; position: relative; }
        .selected .option-radio { border-color: white; }
        .selected .option-radio::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; background: white; border-radius: 50%;
        }

        .controls { display: flex; justify-content: space-between; align-items: center; }
        .progress-bar { flex: 1; height: 8px; background: #e2e8f0; margin: 0 30px; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: 0.3s; }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/coursenova-logo.png">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="player-nav">
        <div class="logo-group">
            <h2 id="boardLabel">Board Name</h2>
            <p id="subjectLabel" style="font-size: 0.8rem; color: #64748b;"></p>
        </div>
        
        <div class="timer" id="timer">30:00</div>

        <div class="lang-toggle" onclick="toggleLang()">
            <span id="lang-en" class="active">English</span>
            <span id="lang-hi">Hindi</span>
        </div>
        
        <button class="btn-primary" onclick="submitTest()">Finish Test</button>
    </nav>

    <div class="player-container">
        <div class="question-card">
            <div class="q-meta">Question <span id="qIdx">1</span> of <span id="qTotal">0</span></div>
            <div class="q-text" id="qText">Loading question...</div>
            <div id="optionsGrid">
                <!-- Options injected by JS -->
            </div>
        </div>

        <div class="controls">
            <button class="btn-secondary" id="prevBtn" onclick="prevQ()"><i class="fas fa-arrow-left"></i> Previous</button>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <button class="btn-primary" id="nextBtn" onclick="nextQ()">Next <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const packId = urlParams.get('packId');
        const board = urlParams.get('board');
        const subject = urlParams.get('subject');
        let currentLang = urlParams.get('lang') || 'en';
        
        let questions = [];
        let userAnswers = {};
        let currentIndex = 0;
        let timeLeft = 30 * 60; // 30 minutes

        document.getElementById('boardLabel').innerText = board;
        document.getElementById('subjectLabel').innerText = subject;

        function getTestKey() {
            return `ongoing_test_player_${packId}_${subject}`;
        }

        function saveTestState() {
            localStorage.setItem(getTestKey(), JSON.stringify({
                userAnswers: userAnswers,
                timeLeft: timeLeft,
                currentIndex: currentIndex,
                timestamp: Date.now()
            }));
        }

        document.addEventListener('DOMContentLoaded', () => {
            alert("⚠️ IMPORTANT EXAM RULE:\n\nYou must not take help from any electronic devices, books, or online search tools. Please take the exam honestly using your own mind. Good luck!");
            fetchQuestions();
        });

        async function fetchQuestions() {
            const token = typeof getAuthToken === 'function' ? getAuthToken() : (localStorage.getItem('token') || localStorage.getItem('coursenova_token') || localStorage.getItem('coursenovaToken'));
            try {
                const res = await fetch(`/api/mocktest/packs/${packId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.ok) {
                    // Find the test for the selected subject
                    const test = data.pack.tests.find(t => t.testTitle.includes(subject)) || data.pack.tests[0];
                    questions = test.questions;
                    document.getElementById('qTotal').innerText = questions.length;
                    
                    // Resume Attempt Check
                    let startFromIdx = 0;
                    const savedStateStr = localStorage.getItem(getTestKey());
                    if (savedStateStr) {
                        const savedState = JSON.parse(savedStateStr);
                        if (Date.now() - savedState.timestamp < 24 * 60 * 60 * 1000) {
                            if (confirm("⚠️ You have an unfinished attempt saved for this test. Would you like to resume from where you left off?")) {
                                userAnswers = savedState.userAnswers || {};
                                timeLeft = savedState.timeLeft !== undefined ? savedState.timeLeft : timeLeft;
                                startFromIdx = savedState.currentIndex || 0;
                            } else {
                                localStorage.removeItem(getTestKey());
                            }
                        } else {
                            localStorage.removeItem(getTestKey());
                        }
                    }

                    currentIndex = startFromIdx;
                    renderQuestion();
                    startTimer();

                    if (currentLang === 'hi') {
                        preTranslateAllQuestions();
                    }
                } else {
                    alert(data.message);
                    window.location.href = 'mock-tests.html';
                }
            } catch (e) { alert('Failed to load test'); }
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            if (!q) return;

            let baseQ = q.question || '';
            let baseQHi = q.question_hi || '';

            baseQ = baseQ.replace(/^(?:Question|Q)\s*\d+\s*[:.-]\s*/i, '').trim();
            if (baseQHi) {
                baseQHi = baseQHi.replace(/^(?:Question|Q)\s*\d+\s*[:.-]\s*/i, '').trim();
            }

            let qText = currentLang === 'hi' ? baseQHi : baseQ;
            let qOptions = currentLang === 'hi'
                ? ((q.options_hi && q.options_hi.length === q.options.length) ? q.options_hi : q.options)
                : ((q.options_en && q.options_en.length === q.options.length) ? q.options_en : q.options);

            if (currentLang === 'hi' && !q.question_hi) {
                if (!q.isTranslating) {
                    q.isTranslating = true;
                    translateQuestion(currentIndex, q._id, baseQ, q.options, 'practice');
                }
                qText = `<div style="display: flex; align-items: center; gap: 10px; color: #3b82f6; font-weight: 600;">
                            <i class="fas fa-spinner fa-spin"></i> हिंदी अनुवाद हो रहा है... (Translating to Hindi...)
                         </div>`;
                qOptions = [];
            }

            document.getElementById('qIdx').innerText = currentIndex + 1;
            document.getElementById('qText').innerHTML = qText;
            
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = qOptions.map((opt, i) => {
                let isSelected = false;
                const savedAns = userAnswers[currentIndex];
                if (savedAns !== undefined && savedAns !== null) {
                    if (typeof savedAns === 'number' || /^\d+$/.test(savedAns)) {
                        isSelected = (parseInt(savedAns, 10) === i);
                    } else {
                        isSelected = (savedAns === opt || savedAns === q.options[i]);
                    }
                }
                return `
                    <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${i})">
                        <div class="option-radio"></div>
                        <span>${cleanOptionText(opt)}</span>
                    </div>
                `;
            }).join('');

            // Progress Fill
            document.getElementById('progressFill').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
            
            // Toggle visibility of buttons
            document.getElementById('prevBtn').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
            document.getElementById('nextBtn').innerText = currentIndex === questions.length - 1 ? 'Last Question' : 'Next Question';
        }

        async function translateQuestion(index, questionId, questionText, options, type) {
            try {
                const token = typeof getAuthToken === 'function' ? getAuthToken() : (localStorage.getItem('token') || localStorage.getItem('coursenova_token') || localStorage.getItem('coursenovaToken'));
                const res = await fetch('/api/test/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        questionId,
                        questionText,
                        options,
                        type
                    })
                });
                const data = await res.json();
                if (data.ok) {
                    questions[index].question_hi = data.question_hi;
                    questions[index].options_hi = data.options_hi;
                    questions[index].explanation_hi = data.explanation_hi;
                } else {
                    questions[index].question_hi = questionText;
                    questions[index].options_hi = options;
                }
            } catch (err) {
                console.error(err);
                questions[index].question_hi = questionText;
                questions[index].options_hi = options;
            } finally {
                questions[index].isTranslating = false;
                if (currentIndex === index) {
                    renderQuestion();
                }
            }
        }

        function selectOption(optIdx) {
            userAnswers[currentIndex] = optIdx;
            saveTestState();
            renderQuestion();
        }


        function nextQ() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                saveTestState();
                renderQuestion();
            }
        }

        function prevQ() {
            if (currentIndex > 0) {
                currentIndex--;
                saveTestState();
                renderQuestion();
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            document.getElementById('lang-en').classList.toggle('active');
            document.getElementById('lang-hi').classList.toggle('active');
            renderQuestion();
            if (currentLang === 'hi') {
                preTranslateAllQuestions();
            }
        }

        async function preTranslateAllQuestions() {
            if (currentLang !== 'hi' || !questions || questions.length === 0) return;
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                if (!q.question_hi && !q.isTranslating) {
                    q.isTranslating = true;
                    translateQuestionInBackground(i, q._id, q.question || q.questionText, q.options, 'practice');
                }
            }
        }

        async function translateQuestionInBackground(index, questionId, questionText, options, type) {
            try {
                const token = typeof getAuthToken === 'function' ? getAuthToken() : (localStorage.getItem('token') || localStorage.getItem('coursenova_token') || localStorage.getItem('coursenovaToken'));
                const res = await fetch('/api/test/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ questionId, questionText, options, type })
                });
                const data = await res.json();
                if (data.ok) {
                    questions[index].question_hi = data.question_hi;
                    questions[index].options_hi = data.options_hi;
                    questions[index].explanation_hi = data.explanation_hi;
                    if (currentIndex === index) {
                        renderQuestion();
                    }
                }
            } catch (err) {
                console.warn('Background translation error for index ' + index, err);
            } finally {
                questions[index].isTranslating = false;
            }
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft % 5 === 0) {
                    saveTestState(); // Save every 5 seconds
                }

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    alert("Time's up! Submitting your test.");
                    submitTest();
                }
                timeLeft--;
            }, 1000);
        }

        async function submitTest() {
            const token = typeof getAuthToken === 'function' ? getAuthToken() : (localStorage.getItem('token') || localStorage.getItem('coursenova_token') || localStorage.getItem('coursenovaToken'));
            
            let correct = 0;
            let incorrect = 0;
            let unattempted = 0;

            questions.forEach((q, i) => {
                const rawAns = userAnswers[i];
                if (rawAns === undefined || rawAns === null || rawAns === '') {
                    unattempted++;
                } else {
                    let ans = '';
                    if (typeof rawAns === 'number' || (typeof rawAns === 'string' && /^\d+$/.test(rawAns))) {
                        const idx = parseInt(rawAns, 10);
                        ans = q.options[idx];
                    } else {
                        ans = rawAns;
                    }

                    if (ans === q.correctAnswer) {
                        correct++;
                    } else {
                        incorrect++;
                    }
                }
            });

            // Calculate score with negative marking (-0.25 for incorrect answers)
            const computedScore = (correct * 1.0) - (incorrect * 0.25);
            const accuracyVal = (correct / (correct + incorrect || 1)) * 100;

            // Clear ongoing state upon submission
            localStorage.removeItem(getTestKey());

            try {
                const res = await fetch('/api/mocktest/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        testId: `${packId}-${subject}`,
                        packId: board,
                        score: computedScore,
                        total: questions.length,
                        correct: correct,
                        incorrect: incorrect,
                        unattempted: unattempted,
                        timeSpentSec: (30 * 60) - timeLeft
                    })
                });
                const data = await res.json();
                if (data.ok) {
                    window.location.href = `mock-test-result.html?score=${computedScore}&correct=${correct}&incorrect=${incorrect}&total=${questions.length}&board=${encodeURIComponent(board)}&subject=${encodeURIComponent(subject)}`;
                }
            } catch (e) { alert('Failed to submit results'); }
        }

        function cleanOptionText(text) {
            if (!text) return '';
            return text.replace(/\s*(?:Testbook\s+)?(?:Solution\s+)?Correct\s+Option\s*[-:]\s*[a-eA-E\d]+\s*$/i, '').trim();
        }

        fetchQuestions();
    </script>
</body>
</html>
