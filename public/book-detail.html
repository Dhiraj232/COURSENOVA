<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - COURSENOVA Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --brand: #6c5ce7;
            --brand2: #a29bfe;
            --green: #00b894;
            --orange: #e17055;
            --bg: #f0f2ff;
            --card: #fff;
            --text: #2d3436;
            --muted: #636e72;
            --border: #dfe6e9;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
        }

        /* -- Breadcrumb -- */
        .breadcrumb {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 20px;
            font-size: .85rem;
            color: var(--muted);
        }

        .breadcrumb a {
            color: var(--brand);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        /* -- Layout -- */
        .detail-layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 36px;
        }

        @media(max-width: 750px) {
            .detail-layout {
                grid-template-columns: 1fr;
            }
        }

        /* -- Image Panel -- */
        .img-panel {}

        .main-img {
            width: 100%;
            aspect-ratio: 3/4;
            max-height: 480px;
            background: linear-gradient(135deg, #f0e6ff, #e0f0ff);
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .1);
            cursor: zoom-in;
        }

        .main-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* -- Info Panel -- */
        .info-panel {}

        .book-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: .78rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .cond-Like-New,
        .cond-like-new,
        [class*='cond-Like'] {
            background: #d1fae5;
            color: #065f46;
        }

        .cond-Good,
        .cond-good {
            background: #dbeafe;
            color: #1e40af;
        }

        .cond-Used,
        .cond-used {
            background: #fef3c7;
            color: #92400e;
        }

        .cond-Old,
        .cond-old {
            background: #fee2e2;
            color: #991b1b;
        }

        .book-title {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            margin-bottom: 6px;
        }

        .book-author {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .book-price {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--green);
            margin-bottom: 20px;
        }

        .book-meta-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px 16px;
            margin-bottom: 20px;
            font-size: .9rem;
        }

        .meta-label {
            color: var(--muted);
            font-weight: 600;
            white-space: nowrap;
        }

        .meta-val {
            color: var(--text);
        }

        .book-desc {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            font-size: .92rem;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 24px;
        }

        /* -- Seller Card -- */
        .seller-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .05);
        }

        .seller-card h3 {
            font-size: .85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 16px;
        }

        .seller-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .seller-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .seller-info h4 {
            font-size: 1rem;
            font-weight: 700;
            }

        .seller-info p {
            font-size: .84rem;
            color: var(--muted);
        }

        .seller-detail-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: .88rem;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .seller-detail-row:last-of-type {
            border-bottom: none;
        }

        .seller-detail-row i {
            width: 18px;
            color: var(--brand);
            text-align: center;
        }

        .action-btns {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        .btn-contact,
        .btn-chat {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .3s;
        }

        .btn-contact {
            background: linear-gradient(135deg, var(--green), #55efc4);
            color: white;
        }

        .btn-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 184, 148, .35);
        }

        .btn-chat {
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: white;
        }

        .btn-chat:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108, 92, 231, .35);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37, 211, 102, .35);
        }

        /* -- Chat Section -- */
        .chat-section {
            background: var(--card);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .05);
        }

        .chat-section h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-messages {
            max-height: 260px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            background: var(--bg);
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .chat-msg {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: .88rem;
            max-width: 85%;
        }

        .chat-msg.out {
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-msg.in {
            background: white;
            color: var(--text);
            align-self: flex-start;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            font-size: .72rem;
            opacity: .7;
            margin-top: 4px;
        }

        .chat-input-row {
            display: flex;
            gap: 10px;
        }

        .chat-input-row input {
            flex: 1;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-size: .9rem;
            font-family: inherit;
            transition: border .2s;
        }

        .chat-input-row input:focus {
            outline: none;
            border-color: var(--brand);
        }

        .send-btn {
            padding: 11px 18px;
            border: none;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all .25s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* -- Loading / Error box -- */
        .page-state {
            text-align: center;
            padding: 80px 20px;
            max-width: 500px;
            margin: 40px auto;
        }

        .page-state .icon {
            font-size: 3.5rem;
            margin-bottom: 14px;
        }

        .page-state h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .page-state p {
            color: var(--muted);
        }

        /* -- Related / Back bar -- */
        .back-bar {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 20px 10px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
            font-size: .9rem;
            transition: gap .2s;
        }

        .back-link:hover {
            gap: 12px;
        }
    </style>
    <link rel="stylesheet" href="css/navigation.css">
    <script src="js/navigation.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/coursenova-logo.png">
</head>

<body>
    <!-- --------------- COURSENOVA NAVBAR --------------- -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="images/coursenova-logo.png" alt="COURSENOVA"> <span>COURSENOVA</span></a>
            <ul class="nav-menu" id="navMenu"></ul>
            <div class="nav-buttons" id="navButtons"></div>
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <!-- --------------- BACK BAR --------------- -->
    <div class="back-bar">
        <a href="store.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Store
        </a>
    </div>

    <!-- --------------- BREADCRUMB --------------- -->
    <div class="breadcrumb">
        <a href="index.html">Home</a> /
        <a href="store.html">Store</a> /
        <span id="breadcrumbTitle">Loading...</span>
    </div>

    <!-- --------------- MAIN CONTENT --------------- -->
    <div id="pageContent">
        <div class="page-state">
            <div class="icon"></div>
            <h2>Loading book details...</h2>
            <p>Please wait a moment</p>
        </div>
    </div>

    <!-- --------------- SCRIPTS --------------- -->

    <script>
        const API = '/api/used-books';
        const MSGS_API = '/api/messages';
        const IMG_BASE = '/uploads/books/';
        const bookId = new URLSearchParams(window.location.search).get('id');
        const socket = typeof io !== 'undefined' ? io() : null;

        if (socket && bookId) {
            socket.emit('join-room', `book-${bookId}`);
            socket.on('receive-message', (data) => {
                // If message is for this book, reload chat
                if (data.bookId === bookId) loadMessages();
            });
        }

        if (!bookId) {
            showError('No book ID in URL', 'Please go back and select a book.');
        } else {
            loadBook();
        }

        // --- LOAD BOOK ---
        async function loadBook() {
            try {
                const res = await fetch(`${API}/${bookId}`);
                const data = await res.json();
                if (!data.ok || !data.book) throw new Error(data.message || 'Book not found');
                renderBook(data.book);
                loadMessages();
            } catch (err) {
                showError('Book not found', err.message);
            }
        }

        // --- RENDER BOOK ---
        function renderBook(b) {
            document.title = `${b.title} - COURSENOVA Store`;
            document.getElementById('breadcrumbTitle').textContent = b.title;

            const imgSrc = b.image ? `${IMG_BASE}${b.image}` : null;
            const condKey = (b.condition || 'Used').replace(/\s+/g, '-');
            const initial = (b.sellerName || 'S').charAt(0).toUpperCase();
            const since = new Date(b.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

            document.getElementById('pageContent').innerHTML = `
            <div class="detail-layout">

                <!-- Left: Image -->
                <div class="img-panel">
                    <div class="main-img" id="mainImg">
                        ${imgSrc
                    ? `<img src="${imgSrc}" alt="${b.title}" onerror="this.parentElement.innerHTML=''">`
                    : ''}
                    </div>
                </div>

                <!-- Right: Info -->
                <div class="info-panel">
                    <span class="book-badge cond-${condKey}">${b.condition || 'Used'}</span>
                    <div class="book-title">${b.title}</div>
                    <div class="book-author">by <strong>${b.author}</strong></div>
                    <div class="book-price">₹${b.price}</div>

                    <div class="book-meta-grid">
                        <span class="meta-label">Category</span>  <span class="meta-val">${b.category}</span>
                        <span class="meta-label">College</span>   <span class="meta-val">${b.college || 'General'}</span>
                        <span class="meta-label">Listed On</span> <span class="meta-val">${since}</span>
                    </div>

                    ${b.description ? `
                    <div class="book-desc">${b.description}</div>` : ''}

                    <!-- Map Section -->
                    <div class="seller-card" style="padding: 10px; overflow: hidden;">
                        <h3 style="margin: 10px 0 10px 10px;">Seller Location</h3>
                        ${b.location && b.location.coordinates && b.location.coordinates[0] !== 0 ? `
                            <iframe 
                                width="100%" 
                                height="250" 
                                frameborder="0" 
                                style="border:0; border-radius: 10px;" 
                                src="https://www.google.com/maps?q=${b.location.coordinates[1]},${b.location.coordinates[0]}&z=15&output=embed"
                                allowfullscreen>
                            </iframe>
                            <button class="btn-chat" style="margin-top: 10px; width: 100%;" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${b.location.coordinates[1]},${b.location.coordinates[0]}', '_blank')">
                                <i class="fas fa-directions"></i> Get Directions
                            </button>
                        ` : '<p style="padding: 20px; text-align: center; color: var(--muted);">Location not provided</p>'}
                    </div>

                    <!-- Seller Card -->
                    <div class="seller-card">
                        <h3>Seller Information</h3>
                        <div class="seller-row">
                            <div class="seller-avatar">${initial}</div>
                            <div class="seller-info">
                                <h4>${b.sellerName || 'Anonymous'}</h4>
                                <p>${b.college || 'Student Seller'}</p>
                            </div>
                        </div>
                        <div class="seller-detail-row">
                            <i class="fas fa-phone-alt"></i>
                            <span>${b.contactNumber || 'Not provided'}</span>
                        </div>
                        ${b.whatsapp ? `
                        <div class="seller-detail-row">
                            <i class="fab fa-whatsapp"></i>
                            <span>${b.whatsapp}</span>
                        </div>` : ''}
                        <div class="seller-detail-row">
                            <i class="fas fa-university"></i>
                            <span>${b.college || 'Not specified'}</span>
                        </div>
                        <div class="action-btns">
                            <button class="btn-contact" onclick="contactSeller('${b.contactNumber}')">
                                <i class="fas fa-phone-alt"></i> Call Seller
                            </button>
                            <button class="btn-whatsapp" onclick="whatsappSeller('${b.whatsapp || b.contactNumber}', '${b.title.replace(/'/g, '')}')">
                                <i class="fab fa-whatsapp"></i> WhatsApp
                            </button>
                            <button class="btn-chat" onclick="scrollToChat()">
                                <i class="fas fa-comment-dots"></i> Chat
                            </button>
                        </div>
                    </div>

                    <!-- Chat -->
                    <div class="chat-section" id="chatSection">
                        <h3><i class="fas fa-comments"></i> Chat with Seller</h3>
                        <div class="chat-messages" id="chatMessages">
                            <div style="text-align:center;color:var(--muted);font-size:.85rem;padding:20px;">
                                No messages yet. Say hello!
                            </div>
                        </div>
                        <div class="chat-input-row">
                            <input type="text" id="chatInput" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMsg()">
                            <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>

            </div>`;
        }

        // --- CONTACT SELLER ---
        function contactSeller(phone) {
            if (!phone) { alert('Contact number not provided by seller'); return; }
            if (confirm(`Call seller at ${phone}?`)) {
                window.location.href = `tel:${phone}`;
            }
        }

        function whatsappSeller(phone, bookTitle) {
            if (!phone) { alert('Contact number not provided by seller'); return; }
            const cleaned = phone.replace(/\D/g, '');
            const number = cleaned.length === 10 ? '91' + cleaned : cleaned;
            const message = encodeURIComponent(`Hi! I'm interested in your book "${bookTitle}" listed on COURSENOVA. Is it still available?`);
            window.open(`https://wa.me/${number}?text=${message}`, '_blank');
        }

        function scrollToChat() {
            document.getElementById('chatSection')?.scrollIntoView({ behavior: 'smooth' });
        }

        // --- MESSAGES / CHAT ---
        async function loadMessages() {
            try {
                const res = await fetch(`${MSGS_API}?bookId=${bookId}`);
                const msgs = await res.json();
                renderMessages(Array.isArray(msgs) ? msgs : []);
            } catch (_) { /* silent */ }
        }

        function renderMessages(msgs) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            if (!msgs.length) return; // keep placeholder

            const myName = (() => {
                try {
                    const u = JSON.parse(localStorage.getItem('coursenova_user') || localStorage.getItem('coursenovaUser') || '{}');
                    return u.fullName || u.name || '';
                } catch { return ''; }
            })();

            container.innerHTML = msgs.map(m => {
                const isOut = m.from === myName && myName;
                const time = m.ts ? new Date(m.ts).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : '';
                return `<div class="chat-msg ${isOut ? 'out' : 'in'}">
                    <div>${m.text}</div>
                    <div class="msg-meta">${isOut ? 'You' : m.from} - ${time}</div>
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('chatInput');
            const text = (input?.value || '').trim();
            if (!text) return;

            let fromName = 'Anonymous';
            try {
                const u = JSON.parse(localStorage.getItem('coursenova_user') || localStorage.getItem('coursenovaUser') || '{}');
                fromName = u.fullName || u.name || 'Anonymous';
            } catch (_) { }

            input.value = '';
            input.disabled = true;

            try {
                const res = await fetch(MSGS_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bookId, from: fromName, text })
                });
                const data = await res.json();
                if (data.ok) {
                    if (socket) {
                        socket.emit('send-message', {
                            room: `book-${bookId}`,
                            bookId: bookId,
                            from: fromName,
                            text: text,
                            ts: Date.now()
                        });
                    }
                    loadMessages();
                }
            } catch (_) { }
            input.disabled = false;
            input.focus();
        }

        // --- ERROR STATE ---
        function showError(title, msg) {
            document.getElementById('pageContent').innerHTML = `
            <div class="page-state">
                <div class="icon"></div>
                <h2>${title}</h2>
                <p>${msg}</p>
                <a href="store.html" style="display:inline-block;margin-top:20px;padding:12px 28px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:white;border-radius:10px;font-weight:700;text-decoration:none;">
                    Back to Store
                </a>
            </div>`;
        }
    </script>
</body>

</html>
