<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Results | COURSENOVA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .result-hero {
            padding: 80px 5%;
            background: white;
            text-align: center;
            border-bottom: 2px solid #f1f5f9;
        }
        .score-circle {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 10px solid #e2e8f0;
            margin: 0 auto 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: popIn 0.5s ease;
        }
        .score-circle h2 { font-size: 3.5rem; color: #3b82f6; }
        .score-circle p { color: #64748b; font-weight: 600; }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
        }
        .stat-item { text-align: center; }
        .stat-item h3 { font-size: 2rem; margin-bottom: 5px; }
        .stat-item p { color: #64748b; font-size: 0.9rem; }
        .stat-success { color: #10b981; }
        .stat-danger { color: #ef4444; }

        .action-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/coursenova-logo.png">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container">
        <section class="result-hero">
            <h3 id="boardName">Board Name</h3>
            <p id="subjectName">Subject</p>
            
            <div class="score-circle">
                <h2 id="scoreVal">0</h2>
                <p>OUT OF <span id="totalVal">0</span></p>
            </div>

            <h1 id="resultTitle">Well Done!</h1>
            <p id="resultMsg">You've successfully completed the practice test.</p>

            <div class="stats-row">
                <div class="stat-item">
                    <h3 class="stat-success" id="correctVal">0</h3>
                    <p>Correct</p>
                </div>
                <div class="stat-item">
                    <h3 class="stat-danger" id="incorrectVal">0</h3>
                    <p>Incorrect</p>
                </div>
                <div class="stat-item">
                    <h3 id="accuracyVal">0%</h3>
                    <p>Accuracy</p>
                </div>
            </div>

            <div class="action-btns">
                <button class="btn-primary" onclick="window.location.href='mock-test-hub.html'">Explore More Boards</button>
                <button class="btn-secondary" onclick="retryTest()">Retry Test</button>
            </div>
        </section>
    </main>

    <script src="js/navigation.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const score = parseInt(urlParams.get('score')) || 0;
        const total = parseInt(urlParams.get('total')) || 0;
        const board = urlParams.get('board');
        const subject = urlParams.get('subject');

        document.getElementById('boardName').innerText = board;
        document.getElementById('subjectName').innerText = subject;
        document.getElementById('scoreVal').innerText = score;
        document.getElementById('totalVal').innerText = total;
        document.getElementById('correctVal').innerText = score;
        document.getElementById('incorrectVal').innerText = total - score;
        
        const accuracy = total > 0 ? Math.round((score / total) * 100) : 0;
        document.getElementById('accuracyVal').innerText = `${accuracy}%`;

        if (accuracy < 40) {
            document.getElementById('resultTitle').innerText = "Keep Practicing!";
            document.getElementById('resultMsg').innerText = "Focus on the weak areas and try again.";
        }

        function retryTest() {
            const packId = board.toLowerCase().replace(/\s+/g, '-');
            window.location.href = `board-selector.html?board=${encodeURIComponent(board)}`;
        }
    </script>
</body>
</html>
