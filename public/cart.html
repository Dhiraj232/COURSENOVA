<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - COURSENOVA Book Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9fafb;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #667eea;
            color: white;
            padding: 15px 0;
            margin-bottom: 30px;
        }

        header nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header h1 {
            font-size: 24px;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .cart-items {
            background: white;
            border-radius: 8px;
            padding: 20px;
        }

        .cart-items h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            align-items: center;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 80px;
            height: 100px;
            background: #f3f4f6;
            border-radius: 6px;
            overflow: hidden;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-details h3 {
            margin-bottom: 5px;
        }

        .item-details p {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .item-price {
            font-weight: 600;
            color: #667eea;
        }

        .item-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .qty-control {
            display: flex;
            gap: 5px;
        }

        .qty-control button {
            width: 30px;
            height: 30px;
            border: 1px solid #e5e7eb;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .qty-control input {
            width: 40px;
            text-align: center;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
        }

        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .empty-cart a {
            color: #667eea;
            text-decoration: none;
        }

        .summary {
            background: white;
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .summary h3 {
            margin-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-row strong {
            color: #1f2937;
        }

        .summary-row span {
            color: #6b7280;
        }

        .divider {
            border-top: 1px solid #e5e7eb;
            margin: 15px 0;
        }

        .total {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 700;
        }

        .total span {
            color: #667eea;
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .checkout-btn:hover {
            background: #764ba2;
        }

        .checkout-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .continue-shopping {
            width: 100%;
            padding: 10px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .summary {
                position: relative;
                top: 0;
            }

            .cart-item {
                grid-template-columns: 60px 1fr;
            }

            .item-actions {
                flex-wrap: wrap;
            }
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
    </style>
    <link rel="stylesheet" href="css/navigation.css">
    <script src="js/navigation.js"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/coursenova-logo.png">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <!-- standard navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="images/coursenova-logo.png" alt="COURSENOVA"> <span>COURSENOVA</span></a>
            <ul class="nav-menu" id="navMenu"></ul>
            <div class="nav-buttons" id="navButtons"></div>
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <div class="container">
        <div id="messages"></div>

        <div class="content">
            <div class="cart-items" id="cart-items-container">
                <h2>Your Cart</h2>
                <div class="empty-cart">
                    <p>Loading cart...</p>
                </div>
            </div>

            <div class="summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <strong>Subtotal:</strong>
                    <span>?<span id="subtotal">0</span></span>
                </div>
                <div class="summary-row">
                    <strong>Discount:</strong>
                    <span>-?<span id="discount">0</span></span>
                </div>
                <div class="summary-row">
                    <strong>Shipping:</strong>
                    <span id="shipping">FREE</span>
                </div>
                <div class="divider"></div>
                <div class="total">
                    <strong>Total:</strong>
                    <span>?<span id="total">0</span></span>
                </div>
                <button class="checkout-btn" id="checkout-btn" onclick="proceedToCheckout()">PROCEED TO
                    CHECKOUT</button>
                <button class="continue-shopping" onclick="window.location.href='store.html'">Continue Shopping</button>
            </div>
        </div>
    </div>

    
    <script>
        let cartData = null;

        // Load cart on page load
        document.addEventListener('DOMContentLoaded', loadCart);

        async function loadCart() {
            try {
                                const token = typeof getAuthToken === 'function' ? getAuthToken() : (localStorage.getItem('token') || localStorage.getItem('coursenovaToken') || localStorage.getItem('coursenova_token'));
                if (!token) {
                    document.getElementById('cart-items-container').innerHTML = `
                        <div class="empty-cart">
                            <p>Please <a href="signup.html">login</a> to view your cart</p>
                        </div>
                    `;
                    return;
                }

                const response = await fetch('/api/cart', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (!data.ok) {
                    throw new Error(data.message);
                }

                cartData = data.cart;

                if (!cartData.items || cartData.items.length === 0) {
                    document.getElementById('cart-items-container').innerHTML = `
                        <h2>Your Cart</h2>
                        <div class="empty-cart">
                            <p>Your cart is empty</p>
                            <p><a href="store.html">Continue shopping</a></p>
                        </div>
                    `;
                    document.getElementById('checkout-btn').disabled = true;
                } else {
                    renderCartItems();
                    updateSummary();
                }
            } catch (error) {
                showMessage('Error loading cart: ' + error.message, 'error');
            }
        }

        async function renderCartItems() {
            let html = '<h2>Your Cart (' + cartData.items.length + ' items)</h2>';

            for (const item of cartData.items) {
                try {
                    // Fetch full book details
                    const bookResponse = await fetch(`/api/books/${item.bookId}`);
                    const bookData = await bookResponse.json();
                    const book = bookData.book;

                    const image = book.images && book.images.length > 0 ? book.images[0].imageUrl : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="80"><rect fill="%23ddd" width="60" height="80"/></svg>';

                    html += `
                        <div class="cart-item">
                            <div class="item-image">
                                <img src="${image}" alt="${book.title}">
                            </div>
                            <div class="item-details">
                                <h3>${book.title}</h3>
                                <p>${book.author}</p>
                                <div class="item-price">?${book.price.sellingPrice}</div>
                            </div>
                            <div class="item-actions">
                                <div class="qty-control">
                                    <button onclick="updateQuantity('${item.bookId}', ${item.quantity - 1})">-</button>
                                    <input type="number" value="${item.quantity}" readonly>
                                    <button onclick="updateQuantity('${item.bookId}', ${item.quantity + 1})">+</button>
                                </div>
                                <button class="remove-btn" onclick="removeFromCart('${item.bookId}')">Remove</button>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    console.error('Error loading book:', error);
                }
            }

            document.getElementById('cart-items-container').innerHTML = html;
        }

        async function updateQuantity(bookId, newQty) {
            if (newQty <= 0) {
                removeFromCart(bookId);
                return;
            }

            try {
                const response = await fetch(`/api/cart/${bookId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('coursenovaToken') || localStorage.getItem('coursenova_token')}`
                    },
                    body: JSON.stringify({ quantity: newQty })
                });

                const data = await response.json();

                if (data.ok) {
                    cartData = data.cart;
                    renderCartItems();
                    updateSummary();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Error updating quantity: ' + error.message, 'error');
            }
        }

        async function removeFromCart(bookId) {
            try {
                const response = await fetch(`/api/cart/${bookId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('coursenovaToken') || localStorage.getItem('coursenova_token')}` }
                });

                const data = await response.json();

                if (data.ok) {
                    showMessage('? Item removed', 'success');
                    loadCart();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Error removing item: ' + error.message, 'error');
            }
        }

        function updateSummary() {
            const subtotal = cartData.totalPrice || 0;
            const discount = 0; // Can be implemented with promo codes
            const shipping = subtotal > 500 ? 0 : 50;
            const total = (subtotal - discount + shipping);

            document.getElementById('subtotal').textContent = subtotal.toFixed(0);
            document.getElementById('discount').textContent = discount.toFixed(0);
            document.getElementById('shipping').textContent = shipping === 0 ? 'FREE' : '?' + shipping;
            document.getElementById('total').textContent = total.toFixed(0);
        }

        async function proceedToCheckout() {
            const token = localStorage.getItem('coursenovaToken') || localStorage.getItem('coursenova_token');
            if (!token) {
                showMessage('Please login to proceed', 'error');
                setTimeout(() => { window.location.href = 'signup.html'; }, 1500);
                return;
            }

            if (!cartData.items || cartData.items.length === 0) {
                showMessage('Your cart is empty', 'error');
                return;
            }

            // Redirect to checkout page
            window.location.href = 'checkout.html';
        }

        function showMessage(msg, type) {
            const container = document.getElementById('messages');
            container.innerHTML = `<div class="${type}">${msg}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 3000);
        }
    </script>
</body>

</html>
