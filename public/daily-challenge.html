    <style>
        :root {
            --dc-primary: #8b5cf6;
            --dc-primary-hover: #7c3aed;
            --dc-secondary: #f43f5e;
            --dc-bg: #f8fafc;
            --dc-card: #ffffff;
            --dc-text: #0f172a;
            --dc-text-muted: #64748b;
        }

        body {
            background-color: var(--dc-bg);
            font-family: 'Inter', sans-serif;
            padding-top: 70px;
            color: var(--dc-text);
        }

        .dc-hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            padding: 80px 20px 100px;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .dc-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .dc-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .dc-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .dc-container {
            max-width: 1200px;
            margin: -60px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* Stats Grid */
        .dc-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .dc-stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }

        .dc-stat-card:hover {
            transform: translateY(-5px);
        }

        .dc-stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .icon-streak { background: #fee2e2; color: #ef4444; }
        .icon-rank { background: #fef3c7; color: #f59e0b; }
        .icon-score { background: #e0e7ff; color: #6366f1; }

        .dc-stat-info h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            color: var(--dc-text);
        }

        .dc-stat-info p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--dc-text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Today's Challenge */
        .dc-today-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            margin-bottom: 50px;
            border: 1px solid #e2e8f0;
        }

        .dc-today-header {
            background: linear-gradient(135deg, var(--dc-primary) 0%, #4f46e5 100%);
            padding: 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .dc-today-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dc-live-badge {
            background: #ef4444;
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .dc-today-body {
            padding: 40px;
        }

        .dc-meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .dc-meta-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

        .dc-meta-item i {
            font-size: 1.5rem;
            color: var(--dc-primary);
        }

        .dc-meta-text h4 {
            margin: 0 0 5px 0;
            font-size: 0.9rem;
            color: var(--dc-text-muted);
        }

        .dc-meta-text p {
            margin: 0;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--dc-text);
        }

        .dc-subjects {
            margin-bottom: 30px;
        }

        .dc-subjects h3 {
            font-family: 'Outfit', sans-serif;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .dc-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .dc-tag {
            background: #e0e7ff;
            color: #4f46e5;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .dc-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .dc-btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .dc-btn-primary {
            background: var(--dc-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .dc-btn-primary:hover {
            background: var(--dc-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .dc-btn-secondary {
            background: white;
            color: var(--dc-text);
            border: 2px solid #e2e8f0;
        }

        .dc-btn-secondary:hover {
            border-color: var(--dc-primary);
            color: var(--dc-primary);
        }

        /* History Sections */
        .dc-section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 25px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dc-history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .dc-history-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            transition: transform 0.3s;
        }

        .dc-history-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .dc-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .dc-date {
            font-weight: 700;
            color: var(--dc-text);
        }

        .dc-status-missed { color: #ef4444; font-weight: 600; font-size: 0.9rem; }
        .dc-status-completed { color: #10b981; font-weight: 600; font-size: 0.9rem; }

        .dc-history-score {
            font-size: 1.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--dc-primary);
            margin-bottom: 15px;
        }

        .dc-history-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--dc-primary);
            background: transparent;
            color: var(--dc-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dc-history-btn:hover {
            background: var(--dc-primary);
            color: white;
        }

        @media (max-width: 768px) {
            .dc-hero h1 { font-size: 2rem; }
            .dc-today-header { flex-direction: column; align-items: flex-start; }
            .dc-actions { flex-direction: column; }
            .dc-btn { width: 100%; justify-content: center; }
        }
    </style>

                </div>

        <!-- Exam Category Switcher -->
        <div style="display: flex; gap: 15px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;">
            <button class="exam-tab active" onclick="switchExam('SSC CGL')">SSC CGL</button>
            <button class="exam-tab" onclick="switchExam('Railway Group D')">Railway Group D</button>
            <button class="exam-tab" onclick="switchExam('CTET')">CTET</button>
            <button class="exam-tab" onclick="switchExam('Army GD')">Army GD</button>
            <button class="exam-tab" onclick="switchExam('Bihar Police')">Bihar Police</button>
            <button class="exam-tab" onclick="switchExam('SSC GD')">SSC GD</button>
        </div>

        <!-- Today's Challenge Container (Dynamic) -->
        <div id="challengeContainer">
            <div id="loadingChallenge" style="text-align: center; padding: 100px; color: #64748b;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 20px;"></i>
                <p>Fetching today's challenge...</p>
            </div>
        </div>

        <style>
            .exam-tab {
                background: white; border: 2px solid #e2e8f0; color: #64748b; padding: 12px 24px; border-radius: 100px; font-weight: 700; font-size: 0.95rem; cursor: pointer; white-space: nowrap; transition: 0.3s;
            }
            .exam-tab.active {
                background: #2563eb; border-color: #2563eb; color: white; box-shadow: 0 10px 20px rgba(37,99,235,0.2);
            }
            .exam-tab:hover:not(.active) {
                border-color: #cbd5e1; background: #f8fafc;
            }
        </style>

            </div>
        </div>


    </div>

    <script src="js/config.js"></script>
    <script src="js/navigation.js"></script>
    <script>
        let currentExamType = 'SSC CGL';

        let currentChallengeData = null;

        function startSSCTest() {
            if (!currentChallengeData) return alert("Challenge not loaded.");
            window.location.href = `daily-challenge-taker.html?id=${currentChallengeData._id}`;
        }

        async function switchExam(type) {
            currentExamType = type;
            // Update tabs
            document.querySelectorAll('.exam-tab').forEach(tab => {
                tab.classList.toggle('active', tab.innerText === type);
            });
            await fetchChallenge(type);
        }

        async function fetchChallenge(examType) {
            const container = document.getElementById('challengeContainer');
            container.innerHTML = `<div style="text-align: center; padding: 100px; color: #64748b;"><i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 20px;"></i><p>Loading ${examType}...</p></div>`;

            try {
                const res = await fetch(`/api/test/daily-challenge/today/${encodeURIComponent(examType)}`);
                const data = await res.json();
                
                if (data.ok && data.challenge) {
                    currentChallengeData = data.challenge;
                    renderChallengeCard(data.challenge);
                } else {
                    container.innerHTML = `
                        <div style="background: white; border-radius: 24px; padding: 60px; text-align: center; border: 1px solid #e2e8f0;">
                            <i class="fas fa-calendar-times" style="font-size: 3rem; color: #cbd5e1; margin-bottom: 20px;"></i>
                            <h2 style="font-family: 'Outfit', sans-serif;">No Challenge for Today</h2>
                            <p style="color: #64748b;">The admin hasn't uploaded today's ${examType} set yet.</p>
                        </div>
                    `;
                }
            } catch (err) {
                container.innerHTML = `<p style="text-align: center; color: red;">Error loading challenge.</p>`;
            }
        }

        function renderChallengeCard(challenge) {
            const todayStr = new Date().toISOString().split('T')[0];
            const container = document.getElementById('challengeContainer');
            container.innerHTML = `
                <div class="dc-today-card" style="background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06); margin-bottom: 50px; border: 1px solid #e2e8f0; max-width: 950px; margin-left: auto; margin-right: auto;">
                    <div style="display: flex; flex-wrap: wrap;">
                        <div style="flex: 1.4; padding: 40px; border-right: 1px solid #f1f5f9; min-width: 300px;">
                            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                                <span style="background: #eff6ff; color: #2563eb; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.5px;">${challenge.examType} SERIES</span>
                                <span style="background: #fef2f2; color: #ef4444; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; animation: pulse 2s infinite;">LIVE @ 9 PM</span>
                            </div>
                            <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800; color: #0f172a; margin: 0 0 10px 0;">${challenge.title}</h2>
                            <p style="color: #64748b; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5;">Attempt today's mixed-subject challenge for ${challenge.examType} and compete with others.</p>
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px;">
                                <div style="text-align: center; padding: 12px; background: #f8fafc; border-radius: 12px;">
                                    <div style="font-size: 0.7rem; color: #94a3b8; font-weight: 700; text-transform: uppercase;">Questions</div>
                                    <div style="font-size: 1rem; font-weight: 800; color: #1e293b;">${challenge.questions.length} Qs</div>
                                </div>
                                <div style="text-align: center; padding: 12px; background: #f8fafc; border-radius: 12px;">
                                    <div style="font-size: 0.7rem; color: #94a3b8; font-weight: 700; text-transform: uppercase;">Time</div>
                                    <div style="font-size: 1rem; font-weight: 800; color: #1e293b;">${challenge.durationMinutes} Min</div>
                                </div>
                                <div style="text-align: center; padding: 12px; background: #fff1f2; border-radius: 12px;">
                                    <div style="font-size: 0.7rem; color: #ef4444; font-weight: 700; text-transform: uppercase;">Negative</div>
                                    <div style="font-size: 1rem; font-weight: 800; color: #ef4444;">-0.25</div>
                                </div>
                            </div>
                        </div>
                        <div style="flex: 1; padding: 40px; background: #fcfdfe; display: flex; flex-direction: column; justify-content: center; min-width: 280px;">
                            <div style="text-align: center; margin-bottom: 25px;">
                                <div style="display: flex; align-items: baseline; justify-content: center; gap: 10px;">
                                    <span style="color: #94a3b8; text-decoration: line-through; font-size: 1.1rem; font-weight: 600;">₹199</span>
                                    <span style="color: #10b981; font-size: 2rem; font-weight: 900;">FREE</span>
                                </div>
                                <p style="font-size: 0.8rem; color: #64748b; font-weight: 600; margin-top: 5px;"><i class="fas fa-hourglass-half"></i> <span id="countdownTimer">Calculating...</span></p>
                            </div>
                            <button class="dc-btn" onclick="startSSCTest()" style="width: 100%; background: #2563eb; color: white; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; border: none; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); transition: 0.3s; margin-bottom: 20px;">
                                START TEST <i class="fas fa-chevron-right" style="margin-left: 8px; font-size: 0.9rem;"></i>
                            </button>
                            <div style="display: flex; flex-direction: column; gap: 12px;">
                                <div onclick="window.open('/api/admin/daily-challenge/pdf-questions/${challenge.date}', '_blank')" style="font-size: 0.85rem; color: #475569; font-weight: 700; cursor: pointer; text-align: center;"><i class="fas fa-file-pdf"></i> Download Questions</div>
                                <div onclick="window.open('/api/admin/daily-challenge/pdf-solutions/${challenge.date}', '_blank')" style="font-size: 0.85rem; color: #475569; font-weight: 700; cursor: pointer; text-align: center;"><i class="fas fa-check-circle"></i> Download Solutions</div>
                                 <a href="daily-challenge-history" style="font-size: 0.85rem; color: #2563eb; font-weight: 700; text-align: center; text-decoration: none; margin-top: 5px;">View Archive <i class="fas fa-arrow-right"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            updateCountdown();
        }

        async function fetchStats() {
            const token = typeof getAuthToken === 'function' ? getAuthToken() : (localStorage.getItem('token') || localStorage.getItem('coursenovaToken') || localStorage.getItem('coursenova_token'));
            if (!token) return;

            try {
                const res = await fetch('/api/test/daily-challenge/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.ok) {
                    if(document.getElementById('streakCount')) document.getElementById('streakCount').innerText = data.streak || '0';
                    if(document.getElementById('userRank')) document.getElementById('userRank').innerText = (data.rank !== 'N/A' && data.rank !== '--') ? `#${data.rank}` : '--';
                    if(document.getElementById('lastScore')) {
                        const total = data.totalQuestions || 15;
                        const formattedScore = typeof data.score === 'number' ? (Number.isInteger(data.score) ? data.score : data.score.toFixed(2)) : (data.score || 0);
                        document.getElementById('lastScore').innerText = `${formattedScore}/${total}`;
                    }
                }
            } catch (err) {
                console.error('Stats fetch error:', err);
            }
        }

        function updateCountdown() {
            const now = new Date();
            const target = new Date();
            target.setHours(21, 0, 0, 0); // 9:00 PM

            const timerEl = document.getElementById('countdownTimer');
            if(!timerEl) return;

            if (now > target) {
                timerEl.innerHTML = "Test is LIVE! 🔥";
                return;
            }

            const diff = target - now;
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            timerEl.innerHTML = `Starts in: ${h}h ${m}m ${s}s`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchStats();
            switchExam('SSC CGL');
            setInterval(updateCountdown, 1000);
        });
    </script>
</body>
</html>
