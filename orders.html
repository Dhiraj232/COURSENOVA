<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - RENVOX Book Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9fafb;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #667eea;
            color: white;
            padding: 15px 0;
            margin-bottom: 30px;
        }

        header nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header h1 {
            font-size: 24px;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            padding: 12px 0;
            cursor: pointer;
            font-weight: 500;
            color: #6b7280;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .order-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .order-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
            padding: 20px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
        }

        .order-header-item strong {
            display: block;
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .order-header-item span {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
        }

        .order-header-item .status {
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
        }

        .status.pending {
            background: #fed7aa;
            color: #92400e;
        }

        .status.confirmed {
            background: #bfdbfe;
            color: #1e40af;
        }

        .status.shipped {
            background: #a7f3d0;
            color: #065f46;
        }

        .status.delivered {
            background: #dcfce7;
            color: #166534;
        }

        .order-items {
            padding: 20px;
        }

        .order-item {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #e5e7eb;
            align-items: center;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 80px;
            height: 100px;
            background: #f3f4f6;
            border-radius: 6px;
            overflow: hidden;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-info h4 {
            margin-bottom: 5px;
        }

        .item-info p {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .item-price {
            text-align: right;
        }

        .item-price .qty {
            font-size: 13px;
            color: #6b7280;
        }

        .item-price .total {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
        }

        .order-timeline {
            padding: 20px;
            background: #f9fafb;
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 15px;
        }

        .timeline-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .timeline-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .timeline-item.completed .timeline-icon {
            background: #10b981;
            color: white;
        }

        .timeline-item.pending .timeline-icon {
            background: #f59e0b;
            color: white;
        }

        .timeline-content {
            display: block;
        }

        .timeline-time {
            font-size: 13px;
            color: #6b7280;
        }

        .timeline-status {
            font-weight: 600;
            margin-top: 3px;
        }

        .timeline-note {
            font-size: 13px;
            color: #6b7280;
            margin-top: 3px;
        }

        .order-actions {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        .btn-secondary {
            background: white;
            border: 1px solid #e5e7eb;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #f9fafb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state h3 {
            margin-bottom: 10px;
        }

        .empty-state a {
            color: #667eea;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .order-header {
                grid-template-columns: 1fr 1fr;
            }

            .order-item {
                grid-template-columns: 60px 1fr;
            }

            .item-price {
                grid-column: 2;
                text-align: left;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>
    <!-- standard navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-brain"></i> RENVOX AI
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="certificates.html">Courses</a></li>
                <li><a href="practice.html">Practice</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="my-certificates.html">Certificates</a></li>
            </ul>
            <div class="nav-buttons" id="navButtons"></div>
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('active')">Active Orders</div>
            <div class="tab" onclick="switchTab('past')">Past Orders</div>
        </div>

        <!-- Orders Container -->
        <div class="tab-content active" id="active">
            <div id="active-orders"></div>
        </div>

        <div class="tab-content" id="past">
            <div id="past-orders"></div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script>
        let allOrders = [];

        // Load orders on page load
        document.addEventListener('DOMContentLoaded', loadOrders);

        async function loadOrders() {
            try {
                const token = localStorage.getItem('renvoxToken') || localStorage.getItem('renvox_token');
                if (!token) {
                    document.getElementById('active-orders').innerHTML = `
                        <div class="empty-state">
                            <h3>Please login to view orders</h3>
                            <p><a href="signup.html">Login here</a></p>
                        </div>
                    `;
                    return;
                }

                const response = await fetch('/api/orders', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (!data.ok) {
                    throw new Error(data.message);
                }

                allOrders = data.orders || [];

                if (allOrders.length === 0) {
                    document.getElementById('active-orders').innerHTML = `
                        <div class="empty-state">
                            <h3>No orders yet</h3>
                            <p><a href="store.html">Start shopping</a></p>
                        </div>
                    `;
                    document.getElementById('past-orders').innerHTML = `
                        <div class="empty-state">
                            <h3>No past orders</h3>
                        </div>
                    `;
                } else {
                    renderOrders();
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('active-orders').innerHTML = `<p style="color: #ef4444;">Error loading orders: ${error.message}</p>`;
            }
        }

        function renderOrders() {
            const activeOrders = allOrders.filter(o => !['delivered', 'cancelled', 'returned'].includes(o.status.current));
            const pastOrders = allOrders.filter(o => ['delivered', 'cancelled', 'returned'].includes(o.status.current));

            let activeHtml = activeOrders.length === 0 ?
                '<div class="empty-state"><h3>No active orders</h3><p><a href="store.html">Continue shopping</a></p></div>' :
                activeOrders.map(order => renderOrderCard(order)).join('');

            let pastHtml = pastOrders.length === 0 ?
                '<div class="empty-state"><h3>No past orders</h3></div>' :
                pastOrders.map(order => renderOrderCard(order)).join('');

            document.getElementById('active-orders').innerHTML = activeHtml;
            document.getElementById('past-orders').innerHTML = pastHtml;
        }

        function renderOrderCard(order) {
            const statusClass = order.status.current.replace(/_/g, '-');
            const statusLabel = order.status.current.replaceAll('_', ' ').toUpperCase();

            let itemsHtml = '';
            if (order.items) {
                itemsHtml = order.items.map(item => {
                    const image = item.bookId?.images?.[0]?.imageUrl || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="100"><rect fill="%23ddd" width="80" height="100"/></svg>';
                    return `
                        <div class="order-item">
                            <div class="item-image">
                                <img src="${image}" alt="${item.bookTitle}">
                            </div>
                            <div class="item-info">
                                <h4>${item.bookTitle}</h4>
                                <p>${item.seller?.sellerName || 'Unknown Seller'}</p>
                            </div>
                            <div class="item-price">
                                <div class="qty">Qty: ${item.quantity}</div>
                                <div class="total">₹${item.totalPrice}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            let timelineHtml = '';
            if (order.status.timeline) {
                timelineHtml = order.status.timeline.map(event => {
                    const isCompleted = order.status.timeline.indexOf(event) < order.status.timeline.length - 1;
                    return `
                        <div class="timeline-item ${isCompleted ? 'completed' : 'pending'}">
                            <div class="timeline-icon">${isCompleted ? '✓' : '◯'}</div>
                            <div class="timeline-content">
                                <div class="timeline-status">${event.status.replaceAll('_', ' ').toUpperCase()}</div>
                                <div class="timeline-time">${new Date(event.timestamp).toLocaleDateString()} ${new Date(event.timestamp).toLocaleTimeString()}</div>
                                ${event.note ? `<div class="timeline-note">${event.note}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            return `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-header-item">
                            <strong>Order Number</strong>
                            <span>${order.orderNumber}</span>
                        </div>
                        <div class="order-header-item">
                            <strong>Status</strong>
                            <span><div class="status ${statusClass}">${statusLabel}</div></span>
                        </div>
                        <div class="order-header-item">
                            <strong>Placed</strong>
                            <span>${new Date(order.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="order-header-item">
                            <strong>Total</strong>
                            <span>₹${order.pricing.finalAmount}</span>
                        </div>
                    </div>

                    <div class="order-items">
                        <div style="font-weight: 600; margin-bottom: 15px;">Items (${order.items.length})</div>
                        ${itemsHtml}
                    </div>

                    <div class="order-timeline">
                        <div class="timeline-title">📍 Tracking</div>
                        ${timelineHtml}
                    </div>

                    <div class="order-actions">
                        <button class="btn-secondary" onclick="viewOrderDetails('${order._id}')">View Details</button>
                        <button class="btn-secondary" onclick="contactSeller('${order.items[0]?.seller?.sellerId}')">Contact Seller</button>
                        ${order.status.current === 'delivered' && order.return.status === 'none' ?
                    `<button class="btn-secondary" onclick="requestReturn('${order._id}')">Request Return</button>` : ''}
                    </div>
                </div>
            `;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function viewOrderDetails(orderId) {
            // Navigate to detail page (can be extended)
            console.log('View details for order:', orderId);
        }

        function contactSeller(sellerId) {
            if (sellerId) {
                window.location.href = `chat.html?sellerId=${sellerId}`;
            }
        }

        function requestReturn(orderId) {
            const reason = prompt('Please enter the reason for return:');
            if (reason) {
                fetch(`/api/orders/${orderId}/return`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('renvoxToken') || localStorage.getItem('renvox_token')}`
                    },
                    body: JSON.stringify({ reason })
                }).then(r => r.json()).then(data => {
                    if (data.ok) {
                        alert('Return request submitted!');
                        loadOrders();
                    } else {
                        alert('Error: ' + data.message);
                    }
                });
            }
        }
    </script>
</body>

</html>
