<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RENVOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            padding-top: 80px;
        }

        .auth-card {
            display: flex;
            flex-direction: row-reverse;
            /* Flip sides for signup vs login! */
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            width: 100%;
            max-width: 1100px;
            min-height: 650px;
        }

        .auth-left {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .auth-right {
            flex: 1;
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            /* Greenish theme for signup */
            color: white;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .auth-right::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(40px);
        }

        .auth-right::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            filter: blur(40px);
        }

        .auth-right h2 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
            z-index: 1;
        }

        .auth-right p {
            font-size: 1.15rem;
            opacity: 0.9;
            line-height: 1.6;
            z-index: 1;
        }

        .logo-container {
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: #10b981;
        }

        .logo-container i {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .auth-subtitle {
            color: #6b7280;
            font-size: 1.05rem;
            margin-bottom: 3.5rem;
            max-width: 80%;
            line-height: 1.5;
        }

        .google-btn-wrapper {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .google-btn-wrapper {
            margin-bottom: 2rem;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #9ca3af;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        /* Traditional Form Styles */
        .auth-form {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 2rem;
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.15rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.4rem;
        }

        .form-input {
            width: 100%;
            padding: 0.65rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: #047857;
        }

        .link-toggle {
            color: #6b7280;
            font-size: 0.95rem;
        }

        .link-toggle a {
            color: #10b981;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.2s;
        }

        .link-toggle a:hover {
            color: #047857;
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .auth-card {
                flex-direction: column;
                min-height: auto;
                max-width: 500px;
            }

            .auth-right {
                display: none;
            }

            .auth-left {
                padding: 3rem 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-left">
                <a href="index.html" style="text-decoration:none;">
                    <div class="logo-container">
                        <i class="fas fa-book"></i> RENVOX
                    </div>
                </a>

                <h1 class="auth-title">Welcome to RENVOX</h1>
                <p class="auth-subtitle">Get started with a single click. Sign in or join our community using your
                    Google account.
                </p>

                <div class="google-btn-wrapper">
                    <!-- Google Identity Services Div -->
                    <div id="g_id_onload"
                        data-client_id="515938781385-pch5g9vm1ec8tjqeq1au73ni3ov6fepn.apps.googleusercontent.com"
                        data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin"
                        data-auto_prompt="false">
                    </div>

                    <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline"
                        data-text="continue_with" data-size="large" data-logo_alignment="center" data-width="320">
                    </div>
                </div>
            </div>

            <div class="auth-right">
                <h2>Start Learning Today.</h2>
                <p>Gain access to premium certificates, extensive practice questions, and an entire community of
                    passionate students.</p>
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script>
        async function handleGoogleLogin(response) {
            try {
                // Support testing from VS Code Live Server (port 5503)
                const API_BASE = window.location.port === '5503' ? 'http://localhost:4000' : '';

                // Send standard Google credential JWT to our backend
                const res = await fetch(`${API_BASE}/api/google-auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });
                const data = await res.json();

                if (data.ok) {
                    localStorage.setItem('renvoxUser', JSON.stringify(data.user));
                    localStorage.setItem('renvoxToken', data.token);
                    localStorage.setItem('userName', data.user.fullName);

                    window.location.href = 'index.html';
                } else {
                    alert('Signup failed: ' + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('A network error occurred connecting to the server.');
            }
        }

        // Traditional form submission removed for Google-only login
    </script>
</body>

</html>
