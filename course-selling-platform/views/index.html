<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENVOX AI - Courses</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/">RENVOX AI</a>
            </div>
            <ul class="navbar-nav" id="nav-links">
                <!-- Injected via utils.js -->
            </ul>
        </div>
    </nav>

    <div class="container mt-2">
        <h1 class="text-center">Available Courses</h1>
        <p class="text-center mb-2">Enhance your skills with our premium courses</p>

        <div id="courses-container" class="courses-grid">
            <!-- Courses loaded via JS -->
            <p>Loading courses...</p>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const coursesContainer = document.getElementById('courses-container');

            const res = await apiCall('/courses');

            if (res.ok && res.data.length > 0) {
                let html = '';
                res.data.forEach(course => {
                    html += `
            <div class="card course-card">
              <h3>${course.title}</h3>
              <p>${course.description.substring(0, 100)}...</p>
              <div class="price">₹${course.price}</div>
              <a href="/course.html?id=${course._id}" class="btn btn-primary text-center">View Course</a>
            </div>
          `;
                });
                coursesContainer.innerHTML = html;
            } else {
                coursesContainer.innerHTML = '<p>No courses found. Check back later!</p>';
            }
        });
    </script>
</body>

</html>
