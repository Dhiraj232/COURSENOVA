<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RENVOX AI</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/">RENVOX AI</a>
            </div>
            <ul class="navbar-nav" id="nav-links"></ul>
        </div>
    </nav>

    <div class="container mt-2">
        <h2 class="text-center">Complete Your Purchase</h2>
        <div id="msg" class="alert hidden mt-1"></div>

        <div class="card" style="max-width: 600px; margin: 20px auto;">
            <h3 id="course-title-display">Course Name</h3>
            <p class="price" id="course-price-display">Price: ₹0</p>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #dee2e6;">

            <div
                style="background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px;">
                <h4>UPI Payment Details</h4>
                <p>Please pay the exact amount to the following UPI ID:</p>
                <p style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">renvox@upi</p>
                <p class="mt-1" style="font-size: 0.9em; color: var(--secondary);">After payment, upload the screenshot
                    below.</p>
            </div>

            <form id="payment-form">
                <input type="hidden" id="courseId">
                <input type="hidden" id="courseName">

                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="screenshot">Upload Payment Screenshot</label>
                    <input type="file" id="screenshot" name="screenshot" accept="image/*" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-success" style="width: 100%;" id="submit-btn">Submit Payment
                    Proof</button>
            </form>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = '/login.html';

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('courseId');
            const courseName = urlParams.get('courseName');
            const price = urlParams.get('price');
            const user = getUser();

            if (!courseId) {
                window.location.href = '/';
                return;
            }

            document.getElementById('course-title-display').innerText = courseName;
            document.getElementById('course-price-display').innerText = `Amount to Pay: ₹${price}`;
            document.getElementById('courseId').value = courseId;
            document.getElementById('courseName').value = courseName;

            if (user) {
                document.getElementById('name').value = user.name;
                document.getElementById('email').value = user.email;
            }
        });

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Submitting...';

            const msgDiv = document.getElementById('msg');

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('courseId', document.getElementById('courseId').value);
            formData.append('courseName', document.getElementById('courseName').value);
            formData.append('screenshot', document.getElementById('screenshot').files[0]);

            const res = await apiCall('/payments/submit', 'POST', formData, true);

            if (res.ok) {
                msgDiv.textContent = 'Payment submitted successfully! An admin will review and approve your access shortly.';
                msgDiv.className = 'alert alert-success mt-1';
                document.getElementById('payment-form').reset();
            } else {
                msgDiv.textContent = res.error;
                msgDiv.className = 'alert alert-error mt-1';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Payment Proof';
            }
        });
    </script>
</body>

</html>
