<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RENVOX AI</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/">RENVOX AI</a>
            </div>
            <ul class="navbar-nav" id="nav-links"></ul>
        </div>
    </nav>

    <div class="container mt-2">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2 class="text-center">Login to your Account</h2>
            <div id="msg" class="alert hidden mt-1"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p class="text-center mt-1">Don't have an account? <a href="/signup.html">Sign Up</a></p>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        if (isLoggedIn()) window.location.href = '/';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('msg');

            const res = await apiCall('/auth/login', 'POST', { email, password });

            if (res.ok) {
                localStorage.setItem('token', res.data.token);
                localStorage.setItem('user', JSON.stringify({
                    id: res.data._id,
                    name: res.data.name,
                    email: res.data.email,
                    role: res.data.role
                }));

                if (res.data.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/';
                }
            } else {
                msgDiv.textContent = res.error;
                msgDiv.className = 'alert alert-error';
            }
        });
    </script>
</body>

</html>
