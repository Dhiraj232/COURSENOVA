<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RENVOX AI</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/">RENVOX AI Admin</a>
            </div>
            <ul class="navbar-nav" id="nav-links"></ul>
        </div>
    </nav>

    <div class="container mt-2">
        <h2 class="text-center">Admin Dashboard</h2>
        <div id="msg" class="alert hidden mt-1"></div>

        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <div style="flex: 1;" class="card">
                <h3>Add New Course</h3>
                <form id="add-course-form" class="mt-1">
                    <div class="form-group">
                        <label class="form-label" for="c-title">Title</label>
                        <input type="text" id="c-title" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="c-desc">Description</label>
                        <textarea id="c-desc" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="c-price">Price (₹)</label>
                        <input type="number" id="c-price" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="c-video">Video Link</label>
                        <input type="url" id="c-video" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Course</button>
                </form>
            </div>

            <div style="flex: 2;" class="card">
                <h3>Pending Payment Requests</h3>
                <div style="overflow-x: auto;">
                    <table id="payments-table">
                        <thead>
                            <tr>
                                <th>User Name</th>
                                <th>Email</th>
                                <th>Course</th>
                                <th>Screenshot</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="6" class="text-center">Loading payments...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        if (!isLoggedIn() || !isAdmin()) {
            window.location.href = '/';
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPayments();
        });

        document.getElementById('add-course-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('c-title').value;
            const description = document.getElementById('c-desc').value;
            const price = document.getElementById('c-price').value;
            const videoLink = document.getElementById('c-video').value;
            const msgDiv = document.getElementById('msg');

            const res = await apiCall('/courses', 'POST', { title, description, price, videoLink });

            if (res.ok) {
                msgDiv.textContent = 'Course added successfully!';
                msgDiv.className = 'alert alert-success mt-1';
                document.getElementById('add-course-form').reset();
            } else {
                msgDiv.textContent = res.error;
                msgDiv.className = 'alert alert-error mt-1';
            }
        });

        async function loadPayments() {
            const tbody = document.querySelector('#payments-table tbody');
            const res = await apiCall('/payments');

            if (res.ok) {
                let html = '';

                // Show only pending by default or all? Let's show all and use badges.
                res.data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(payment => {
                    const statusBadge = `<span class="badge badge-${payment.status}">${payment.status.toUpperCase()}</span>`;
                    const actionBtn = payment.status === 'pending' ? `
                    <button onclick="updatePayment('${payment._id}', 'approve')" class="btn btn-success" style="padding: 5px 10px; font-size: 0.8rem;">Approve</button>
                    <button onclick="updatePayment('${payment._id}', 'reject')" class="btn btn-danger" style="padding: 5px 10px; font-size: 0.8rem;">Reject</button>
                ` : '<span>-</span>';

                    html += `
                    <tr>
                        <td>${payment.name}</td>
                        <td>${payment.email}</td>
                        <td>${payment.courseName}</td>
                        <td><a href="${payment.screenshot}" target="_blank">View Proof</a></td>
                        <td>${statusBadge}</td>
                        <td>${actionBtn}</td>
                    </tr>
                `;
                });

                if (res.data.length === 0) {
                    html = '<tr><td colspan="6" class="text-center">No payment requests found.</td></tr>';
                }

                tbody.innerHTML = html;
            } else {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="color:red;">Error loading payments</td></tr>`;
            }
        }

        async function updatePayment(id, action) {
            if (!confirm(`Are you sure you want to ${action} this payment?`)) return;

            const res = await apiCall(`/payments/${id}/${action}`, 'POST');

            if (res.ok) {
                alert(`Payment ${action}d successfully`);
                loadPayments(); // Refresh table
            } else {
                alert(`Error: ${res.error}`);
            }
        }
    </script>
</body>

</html>
