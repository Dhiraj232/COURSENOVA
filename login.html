<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - RENVOX</title>
    <!-- Use Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Navbar Overrides Just for this page to float it */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: none !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            padding-top: 80px;
            /* Accounts for navbar */
        }

        .auth-card {
            display: flex;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            width: 100%;
            max-width: 1100px;
            min-height: 650px;
        }

        .auth-left {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .auth-right {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color) 0%, #3730a3 100%);
            color: white;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Some abstract shapes in the background of the right side */
        .auth-right::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(40px);
        }

        .auth-right::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            filter: blur(40px);
        }

        .auth-right h2 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
            z-index: 1;
        }

        .auth-right p {
            font-size: 1.15rem;
            opacity: 0.9;
            line-height: 1.6;
            z-index: 1;
        }

        .logo-container {
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .logo-container i {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, #3730a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .auth-subtitle {
            color: #6b7280;
            font-size: 1.05rem;
            margin-bottom: 3.5rem;
            max-width: 80%;
            line-height: 1.5;
        }

        .google-btn-wrapper {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            /* Ensure it floats above */
        }

        /* Custom styling around the google button to make it pop */
        .google-btn-wrapper::after {
            content: '';
            display: block;
            height: 1px;
            background: #e5e7eb;
            margin: 2.5rem 0;
            position: relative;
        }

        .link-toggle {
            color: #6b7280;
            font-size: 0.95rem;
        }

        .link-toggle a {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
            transition: color 0.2s;
        }

        .link-toggle a:hover {
            color: #3730a3;
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .auth-card {
                flex-direction: column;
                min-height: auto;
                max-width: 500px;
            }

            .auth-right {
                display: none;
            }

            .auth-left {
                padding: 3rem 2rem;
            }
        }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-left">
                <a href="index.html" style="text-decoration:none;">
                    <div class="logo-container">
                        <i class="fas fa-book"></i> RENVOX
                    </div>
                </a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in securely with Google to continue your professional learning journey.
                </p>
                <div class="google-btn-wrapper">
                    <!-- Google Identity Services Div -->
                    <div id="g_id_onload"
                        data-client_id="515938781385-pch5g9vm1ec8tjqeq1au73ni3ov6fepn.apps.googleusercontent.com"
                        data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin"
                        data-auto_prompt="false"></div>
                    <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline"
                        data-text="continue_with" data-size="large" data-logo_alignment="center" data-width="320"></div>
                </div>
                <p class="link-toggle">Don't have an account? <a href="signup.html">Create one for free</a></p>
            </div>
            <div class="auth-right">
                <h2>Unlock Your Potential.</h2>
                <p>Join thousands of learners achieving their career goals with RENVOX's industry-leading courses and
                    verified certifications.</p>
            </div>
        </div>
    </div>
    <!-- Navigation JS (for setup Navbar function usually) -->
    <script src="navigation.js"></script>
    <script>
        async function handleGoogleLogin(response) {
            try {
                // Support testing from VS Code Live Server (port 5503)
                const API_BASE = window.location.port === '5503' ? 'http://localhost:4000' : '';

                // Send standard Google credential JWT to our backend
                const res = await fetch(`${API_BASE}/api/google-auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await res.json();

                if (data.ok) {
                    // Set token and user in localStorage as per existing auth logic
                    localStorage.setItem('renvoxUser', JSON.stringify(data.user));
                    localStorage.setItem('renvoxToken', data.token);
                    localStorage.setItem('userName', data.user.fullName);

                    // Redirect back to home
                    window.location.href = 'index.html';
                } else {
                    alert('Login failed: ' + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('A network error occurred connecting to the server.');
            }
        }
    </script>
</body>

</html>
