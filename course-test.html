<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        .test-header {
            background: linear-gradient(135deg, #4f46e5, #3730a3);
            color: white;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .test-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .timer-box {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-weight: 700;
            font-size: 1rem;
        }

        .timer-box.urgent {
            background: rgba(239, 68, 68, 0.7);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .test-progress-bar {
            height: 4px;
            background: #e2e8f0;
        }

        .test-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #10b981);
            transition: width 0.4s;
        }

        .test-container {
            max-width: 780px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .question-counter {
            font-size: 0.82rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .question-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 1.75rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1.25rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 500;
            color: #475569;
            transition: all 0.2s;
        }

        .option-label:hover {
            border-color: #a5b4fc;
            background: #f5f3ff;
        }

        .option-label.selected {
            border-color: #4f46e5;
            background: #ede9fe;
            color: #4338ca;
        }

        .option-letter {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #94a3b8;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option-label.selected .option-letter {
            background: #4f46e5;
            color: white;
        }

        .option-label.correct {
            border-color: #10b981;
            background: #f0fdf4;
            color: #15803d;
            pointer-events: none;
        }

        .option-label.correct .option-letter {
            background: #10b981;
            color: white;
        }

        .option-label.wrong {
            border-color: #ef4444;
            background: #fef2f2;
            color: #b91c1c;
            pointer-events: none;
        }

        .option-label.wrong .option-letter {
            background: #ef4444;
            color: white;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn-prev {
            background: #f1f5f9;
            color: #64748b;
        }

        .nav-btn-prev:hover {
            background: #e2e8f0;
        }

        .nav-btn-next {
            background: #4f46e5;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn-next:hover {
            background: #3730a3;
        }

        .nav-btn-submit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 0.75rem 2rem;
        }

        .nav-btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .question-dots {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .q-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .q-dot.answered {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        .q-dot.current {
            border-color: #4f46e5;
            color: #4f46e5;
        }

        /* Result overlay */
        .result-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .result-overlay.show {
            display: flex;
        }

        .result-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 460px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .result-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .result-title.pass {
            color: #059669;
        }

        .result-title.fail {
            color: #dc2626;
        }

        .result-score {
            font-size: 3rem;
            font-weight: 900;
            margin: 1rem 0;
        }

        .result-score.pass {
            color: #10b981;
        }

        .result-score.fail {
            color: #f87171;
        }

        .result-msg {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }

        .result-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-download {
            padding: 0.9rem;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-retry {
            padding: 0.75rem;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: white;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }

        .btn-retry:hover {
            border-color: #4f46e5;
            color: #4f46e5;
        }

        .cert-id {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.75rem;
            font-family: monospace;
        }

        /* Loading */
        .loading-wrap {
            text-align: center;
            padding: 5rem;
            color: #94a3b8;
        }

        .loading-wrap i {
            font-size: 2rem;
            color: #4f46e5;
            animation: spin 1s linear infinite;
            display: block;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

                { q: 'What is a "call to action" (CTA) button?', opts: ['A contact form button', 'A button that encourages users to take a specific action', 'A login button only', 'A navigation link'], ans: 1 },
                { q: 'What does "contrast" in design achieve?', opts: ['Makes all elements look the same', 'Creates visual hierarchy and improves readability', 'Reduces loading time', 'Adds 3D effects'], ans: 1 },
                { q: 'What is "responsive design"?', opts: ['Design that responds to hover', 'Layouts that adapt to different screen sizes', 'Fast-loading designs', 'Interactive animations'], ans: 1 },
                { q: 'What is the purpose of a "grid system" in design?', opts: ['Making dot patterns', 'Organizing content into consistent columns and rows', 'Adding background images', 'Creating tables'], ans: 1 },
            ],
            'Communication Skills': [
                { q: 'What is "active listening"?', opts: ['Listening while multitasking', 'Fully focusing, understanding and responding thoughtfully', 'Listening to music while working', 'Passive hearing'], ans: 1 },
                { q: 'What does "non-verbal communication" include?', opts: ['Emails and texts', 'Body language, facial expressions and gestures', 'Phone calls', 'Written reports'], ans: 1 },
                { q: 'What is the purpose of an "elevator pitch"?', opts: ['Explaining lift safety', 'A brief, persuasive speech to spark interest in 60 seconds', 'A long business presentation', 'A job interview format'], ans: 1 },
                { q: 'What is "assertive communication"?', opts: ['Being aggressive and demanding', 'Expressing thoughts confidently while respecting others', 'Saying yes to everything', 'Avoiding confrontation always'], ans: 1 },
                { q: 'Which opening is best for a professional email?', opts: ['"Yo, what\'s up"', '"Dear Mr./Ms. [Name],"', '"Hey!!!"', '"To whom it may concern or whatever"'], ans: 1 },
                { q: 'What does "empathy" in communication mean?', opts: ['Feeling sorry for others', 'Understanding and sharing the feelings of others', 'Agreeing with everything', 'Avoiding difficult conversations'], ans: 1 },
                { q: 'What is "paraphrasing" in communication?', opts: ['Copying someone\'s words exactly', 'Restating what was said in your own words', 'Interrupting the speaker', 'Changing the topic'], ans: 1 },
                { q: 'What does body language account for in communication?', opts: ['7% of message', 'Up to 55% of impression', '100% of meaning', 'Only 10% of impact'], ans: 1 },
                { q: 'What is "constructive feedback"?', opts: ['Only positive comments', 'Specific, actionable suggestions for improvement', 'Harsh criticism', 'Vague advice'], ans: 1 },
                { q: 'What makes public speaking effective?', opts: ['Speaking very fast', 'Clear structure, eye contact and confident delivery', 'Reading directly from notes', 'Using complex vocabulary only'], ans: 1 },
                { q: 'What is the purpose of small talk?', opts: ['Wasting time', 'Building rapport and relationships before important discussions', 'Avoiding work topics', 'Gossipping'], ans: 1 },
                { q: 'What is "tone" in written communication?', opts: ['Volume of text', 'The attitude or feeling conveyed through word choice', 'Font style in emails', 'The subject line'], ans: 1 },
                { q: 'Which practice improves professional email writing?', opts: ['Using all capitals', 'Being clear, concise and using proper grammar', 'Adding many emojis', 'Writing very long paragraphs'], ans: 1 },
                { q: 'What is "interpersonal communication"?', opts: ['Communication between companies', 'Communication between individuals', 'Internal thoughts', 'Written communication only'], ans: 1 },
                { q: 'How should you handle a communication conflict?', opts: ['Ignore it completely', 'Listen, acknowledge perspectives and find common ground', 'Always escalate immediately', 'Argue until you win'], ans: 1 },
            ],
        };

        let questions = [];
        let userAnswers = [];
        let currentQ = 0;
        let submitted = false;
        let timerInterval = null;
        let timeLeft = 30 * 60;

        // ── Load questions (DB first, fallback to hardcoded) ──────────────────────
        async function loadQuestions() {
            const token = getToken();
            if (!token) { window.location.href = 'signup.html'; return; }

            try {
                if (courseId !== 'Learning Essentials (Free)') {
                    const res = await fetch(`${API}/api/course/details?courseId=${encodeURIComponent(courseId)}`, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (data.ok && data.course && data.course.quizQuestions && data.course.quizQuestions.length >= 5) {
                        questions = data.course.quizQuestions.map(q => ({
                            q: q.question, opts: q.options, ans: q.correctIndex
                        }));
                    }
                }
            } catch (e) { /* use fallback */ }

            // Fallback to hardcoded
            if (questions.length === 0) {
                const bank = QUESTION_BANKS[courseId] || QUESTION_BANKS['default'];
                questions = bank.slice(0, 15);
            }

            userAnswers = new Array(questions.length).fill(null);

            document.getElementById('loadingWrap').style.display = 'none';
            document.getElementById('testContent').style.display = 'block';

            renderQuestion();
            startTimer();
        }

        // ── Timer ─────────────────────────────────────────────────────────────────
        function startTimer() {
            const display = document.getElementById('timerDisplay');
            const box = document.getElementById('timerBox');
            timerInterval = setInterval(() => {
                if (submitted) { clearInterval(timerInterval); return; }
                timeLeft--;
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                display.textContent = `${m}:${s}`;
                if (timeLeft <= 60) box.classList.add('urgent');
                if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(); }
            }, 1000);
        }

        // ── Render question ───────────────────────────────────────────────────────
        function renderQuestion() {
            const q = questions[currentQ];
            const letters = ['A', 'B', 'C', 'D'];
            document.getElementById('questionCounter').textContent = `Question ${currentQ + 1} of ${questions.length}`;
            document.getElementById('testProgressFill').style.width = ((currentQ + 1) / questions.length * 100) + '%';
            document.getElementById('questionArea').innerHTML = `
                <div class="question-card">
                    <div class="question-text">${currentQ + 1}. ${q.q}</div>
                    <div class="options">
                        ${q.opts.map((opt, i) => `
                            <label class="option-label ${userAnswers[currentQ] === i ? 'selected' : ''}" onclick="selectAnswer(${i})">
                                <div class="option-letter">${letters[i]}</div>
                                ${opt}
                            </label>
                        `).join('')}
                    </div>
                </div>`;
            document.getElementById('prevBtn').disabled = currentQ === 0;
            const isLast = currentQ === questions.length - 1;
            document.getElementById('nextBtn').style.display = isLast ? 'none' : 'flex';
            document.getElementById('submitBtn').style.display = isLast ? 'flex' : 'none';
            renderDots();
        }

        function renderDots() {
            document.getElementById('questionDots').innerHTML = questions.map((_, i) => `
                <div class="q-dot ${i === currentQ ? 'current' : ''} ${userAnswers[i] !== null ? 'answered' : ''}" onclick="goTo(${i})">${i + 1}</div>
            `).join('');
        }

        function selectAnswer(idx) {
            if (submitted) return;
            userAnswers[currentQ] = idx;
            document.querySelectorAll('.option-label').forEach((el, i) => el.classList.toggle('selected', i === idx));
            renderDots();
        }

        function navigate(dir) { currentQ = Math.max(0, Math.min(questions.length - 1, currentQ + dir)); renderQuestion(); }
        function goTo(idx) { currentQ = idx; renderQuestion(); }

        // ── Submit ────────────────────────────────────────────────────────────────
        async function submitTest() {
            if (submitted) return;
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
            submitted = true;
            clearInterval(timerInterval);

            const correctAnswers = questions.map(q => q.ans);
            const token = getToken();

            try {
                const res = await fetch(`${API}/api/course/submit-test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                    body: JSON.stringify({ courseId, answers: userAnswers, correctAnswers })
                });
                const data = await res.json();
                if (data.ok) showResult(data);
                else showResultLocal(correctAnswers);
            } catch (e) {
                showResultLocal(correctAnswers);
            }
        }

        function showResultLocal(correctAnswers) {
            let correct = 0;
            userAnswers.forEach((ans, i) => { if (ans === correctAnswers[i]) correct++; });
            const score = Math.round((correct / questions.length) * 100);
            showResult({ passed: score >= 60, score, correct, total: questions.length, certId: null, userName: 'Student' });
        }

        function showResult(data) {
            const { passed, score, correct, total, certId } = data;
            const overlay = document.getElementById('resultOverlay');
            overlay.classList.add('show');

            document.getElementById('resultEmoji').textContent = passed ? '🏆' : '😔';
            document.getElementById('resultTitle').textContent = passed ? 'Congratulations!' : 'Better Luck Next Time!';
            document.getElementById('resultTitle').className = 'result-title ' + (passed ? 'pass' : 'fail');
            document.getElementById('resultScore').textContent = score + '%';
            document.getElementById('resultScore').className = 'result-score ' + (passed ? 'pass' : 'fail');
            document.getElementById('resultMsg').textContent = passed
                ? `You answered ${correct}/${total} correctly and passed! 🎉 Your certificate has been earned.`
                : `You answered ${correct}/${total} correctly. You need 60% to pass. Keep going!`;

            if (certId) document.getElementById('certIdDisplay').textContent = 'Certificate ID: ' + certId;

            const actions = document.getElementById('resultActions');
            if (passed) {
                actions.innerHTML = `
                    <button class="btn-download" onclick="window.location.href='my-certificates.html'">
                        <i class="fas fa-download"></i> Download My Certificate
                    </button>
                    <button class="btn-retry" onclick="window.location.href='course-content.html?course=${encodeURIComponent(courseId)}'">
                        <i class="fas fa-book-open"></i> Back to Course
                    </button>`;
            } else {
                actions.innerHTML = `
                    <button class="btn-download" onclick="window.location.reload()" style="background:linear-gradient(135deg,#4f46e5,#3730a3)">
                        <i class="fas fa-redo"></i> Try Again
                    </button>
                    <button class="btn-retry" onclick="window.location.href='course-content.html?course=${encodeURIComponent(courseId)}'">
                        <i class="fas fa-arrow-left"></i> Review Material
                    </button>`;
            }
        }

        // Init
        loadQuestions();
    </script >
