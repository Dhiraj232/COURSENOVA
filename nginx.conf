# CourseNova Nginx Production Configuration Template

# Rate limiting zones (10 requests/sec limit per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name coursenova.in www.coursenova.in;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name coursenova.in www.coursenova.in;

    # SSL Certificates (Let's Encrypt / custom path placeholder)
    # ssl_certificate /etc/letsencrypt/live/coursenova.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/coursenova.in/privkey.pem;

    # Robust SSL Security Parameters (OWASP recommendations)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # SSL Session Optimization
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Enable Compression (Gzip + Brotli configuration placeholders)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Static file serving with aggressive cache headers
    location / {
        root /var/www/coursenova/public;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Disable cache for HTML & service worker files
        location ~* \.(html|webmanifest)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        }

        # Long-term caching for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|eot|ttf|otf)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
    }

    # Proxy connections to Express backend (PORT 5000)
    location /api/ {
        # Apply rate limiting to API calls
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
